<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>今日の一問 — きみ専用のれんしゅう</title>
<style>
  :root{
    --bg:#0f1226; --card:#1d2247; --card2:#252b56;
    --ink:#eef1ff; --sub:#a6adda; --line:#33396b;
    --accent:#ffd23f; --accent2:#ff8e3c; --good:#37e0a6; --bad:#ff6b8a;
    --blue:#5b9dff; --purple:#b388ff; --green:#5be37a;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%, #2a2f63 0%, var(--bg) 55%) fixed;
    color:var(--ink); min-height:100vh; line-height:1.7;}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 60px;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .logo{font-weight:800;font-size:18px;}
  .logo small{display:block;font-size:11px;color:var(--sub);font-weight:600;}
  .spacer{flex:1;}
  .pill{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;font-weight:700;font-size:13px;}
  .pill.flame{color:var(--accent2);} .pill.xp{color:var(--accent);}
  .iconbtn{width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--line);
    color:var(--ink);font-size:17px;cursor:pointer;display:grid;place-items:center;}
  .iconbtn:active{transform:scale(.95);} .iconbtn.on{background:rgba(91,157,255,.2);border-color:var(--blue);}
  .levelrow{display:flex;align-items:center;gap:10px;margin:4px 2px 14px;}
  .lvbadge{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:15px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#3a2400;box-shadow:0 4px 14px rgba(255,142,60,.4);flex:none;}
  .lvmeta{flex:1;} .lvmeta .t{font-size:12px;color:var(--sub);font-weight:700;}
  .bar{height:9px;background:#0c1030;border-radius:999px;overflow:hidden;margin-top:4px;border:1px solid var(--line);}
  .bar>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--good),var(--blue));border-radius:999px;transition:width .6s cubic-bezier(.2,.9,.2,1);}
  .gradesel{display:flex;gap:7px;margin:0 2px 18px;flex-wrap:wrap;}
  .gchip{flex:1;min-width:0;text-align:center;padding:8px 4px;border-radius:12px;cursor:pointer;
    background:var(--card);border:1px solid var(--line);font-weight:800;font-size:12.5px;color:var(--sub);}
  .gchip small{display:block;font-size:10px;font-weight:600;opacity:.8;}
  .gchip.active{background:rgba(55,224,166,.16);border-color:var(--good);color:#bff7e2;}

  .nowskill{display:flex;align-items:center;gap:8px;margin:0 2px 10px;font-size:12.5px;color:var(--sub);font-weight:700;}
  .nowskill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
  .nowskill b{color:var(--ink);}
  .stepnote{background:rgba(255,142,60,.13);border:1px solid rgba(255,142,60,.4);color:#ffd9b8;
    border-radius:12px;padding:9px 13px;font-size:12.5px;font-weight:700;margin:0 2px 12px;display:none;}
  .stepnote.show{display:block;animation:rise .4s;}
  .stepnote.up{background:rgba(55,224,166,.13);border-color:rgba(55,224,166,.4);color:#bff7e2;}

  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:22px;padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .tag{font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:999px;}
  .tag.subj{background:rgba(91,157,255,.18);color:#bcd6ff;border:1px solid rgba(91,157,255,.35);}
  .tag.lvl{background:rgba(55,224,166,.16);color:#9bf3d4;border:1px solid rgba(55,224,166,.3);}
  .tag.day{background:rgba(255,210,63,.16);color:#ffe69b;border:1px solid rgba(255,210,63,.3);}
  .hook{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:10px;}

  .diawrap{background:#0e1234;border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:14px;}
  .qhead{display:flex;align-items:flex-start;gap:10px;}
  .q{font-size:21px;font-weight:800;line-height:1.5;margin:0 0 16px;flex:1;}
  .speakbtn{flex:none;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
    background:#161a3c;color:var(--blue);font-size:16px;cursor:pointer;margin-top:2px;}
  .speakbtn:active{transform:scale(.93);} .speakbtn.playing{background:rgba(91,157,255,.25);border-color:var(--blue);}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .choice{display:flex;align-items:center;justify-content:center;gap:8px;background:#161a3c;border:2px solid var(--line);
    border-radius:16px;padding:16px 12px;font-size:19px;font-weight:800;cursor:pointer;
    transition:transform .12s,border-color .15s,background .15s;color:var(--ink);min-height:58px;}
  .choice:active{transform:scale(.97);}
  .choice.correct{border-color:var(--good);background:rgba(55,224,166,.16);}
  .choice.wrong{border-color:var(--bad);background:rgba(255,107,138,.14);}
  .choice.dim{opacity:.35;} .choice[disabled]{cursor:default;}

  .reveal{margin-top:16px;display:none;animation:rise .45s cubic-bezier(.2,.9,.2,1);}
  .reveal.show{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .verdict{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;margin-bottom:12px;}
  .verdict.ok{color:var(--good);} .verdict.ng{color:var(--bad);} .verdict .big{font-size:26px;}
  .block{background:#13173a;border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:11px;position:relative;}
  .block .lab{font-size:11.5px;font-weight:800;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .block .lab .e{font-size:15px;} .block .body{font-size:14.5px;color:#dfe3ff;}
  .lab.expl{color:var(--blue);} .lab.real{color:var(--green);} .lab.connect{color:var(--purple);}
  .miniSpeak{position:absolute;top:11px;right:11px;width:28px;height:28px;border-radius:8px;
    border:1px solid var(--line);background:#161a3c;color:var(--blue);font-size:13px;cursor:pointer;}
  .connchips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .connchip{font-size:12px;font-weight:800;padding:6px 11px;border-radius:999px;
    background:rgba(179,136,255,.14);border:1px solid rgba(179,136,255,.35);color:#d7c4ff;}
  .combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);font-size:40px;font-weight:900;
    color:var(--accent);text-shadow:0 4px 24px rgba(255,142,60,.6);opacity:0;pointer-events:none;z-index:50;}
  .combo.go{animation:comboPop 1s ease forwards;}
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.6) rotate(-8deg);}
    20%{opacity:1;transform:translate(-50%,-60%) scale(1.15) rotate(3deg);}100%{opacity:0;transform:translate(-50%,-120%) scale(1) rotate(0);}}
  .btn{display:block;width:100%;text-align:center;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:800;
    cursor:pointer;margin-top:6px;color:#2a1c00;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 6px 18px rgba(255,142,60,.35);}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:transparent;color:var(--sub);box-shadow:none;border:1px solid var(--line);font-weight:700;}
  .section-title{font-size:14px;font-weight:800;color:var(--sub);margin:26px 6px 12px;display:flex;align-items:center;gap:8px;}
  .skills{display:flex;flex-direction:column;gap:9px;}
  .srow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;}
  .srow .top{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13.5px;margin-bottom:7px;}
  .srow .e{font-size:17px;} .srow .pct{margin-left:auto;font-size:12px;color:var(--sub);}
  .srow .track{height:8px;background:#0c1030;border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .srow .track>i{display:block;height:100%;border-radius:999px;transition:width .5s;}
  .srow.weak{border-color:rgba(255,107,138,.5);} .srow.mastered .pct{color:var(--good);}
  .badges{display:flex;gap:10px;flex-wrap:wrap;}
  .badge{width:60px;text-align:center;}
  .badge .bcircle{width:54px;height:54px;border-radius:50%;margin:0 auto 5px;display:grid;place-items:center;font-size:25px;
    background:var(--card);border:2px solid var(--line);filter:grayscale(1);opacity:.4;}
  .badge.got .bcircle{filter:none;opacity:1;border-color:var(--accent);background:rgba(255,210,63,.12);box-shadow:0 4px 14px rgba(255,210,63,.25);}
  .badge .bname{font-size:10px;color:var(--sub);font-weight:700;line-height:1.3;}
  .footer{text-align:center;color:var(--sub);font-size:11.5px;margin-top:30px;line-height:1.8;}
  .footer a{color:var(--blue);text-decoration:none;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(30px);background:var(--card2);
    border:1px solid var(--line);color:var(--ink);padding:12px 18px;border-radius:14px;font-weight:700;font-size:14px;
    box-shadow:var(--shadow);opacity:0;transition:.35s;z-index:60;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .done{text-align:center;padding:30px 10px;} .done .big{font-size:46px;margin-bottom:6px;}
  .done h2{margin:6px 0;font-size:20px;} .done p{color:var(--sub);font-size:14px;}
  .hidden{display:none !important;}
  .modal{position:fixed;inset:0;background:rgba(6,8,22,.72);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;}
  .modal.show{display:flex;}
  .sheet{width:100%;max-width:520px;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow);}
  .sheet h2{margin:0 0 4px;font-size:19px;} .sheet .lead{color:var(--sub);font-size:12.5px;margin-bottom:16px;}
  .statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat{background:#13173a;border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;}
  .stat .n{font-size:22px;font-weight:800;color:var(--accent);} .stat .l{font-size:11px;color:var(--sub);font-weight:700;margin-top:2px;}
  .repbar{margin-bottom:9px;}
  .repbar .top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:4px;}
  .repbar .track{height:10px;background:#0c1030;border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .repbar .track>i{display:block;height:100%;border-radius:999px;}
  .stuck{background:rgba(255,107,138,.1);border:1px solid rgba(255,107,138,.35);border-radius:14px;padding:13px 15px;font-size:13px;color:#ffd4dd;margin:12px 0;}
  .voice{background:rgba(91,157,255,.1);border:1px solid rgba(91,157,255,.3);border-radius:14px;padding:13px 15px;font-size:13px;color:#cfe0ff;margin:12px 0;}
  .voice b,.stuck b{color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">今日の一問<small>きみ専用のれんしゅう</small></div>
    <div class="spacer"></div>
    <div class="pill flame"><span>🔥</span><span id="streak">0</span></div>
    <div class="pill xp"><span>⭐</span><span id="xp">0</span></div>
    <button class="iconbtn" id="autoReadBtn" title="自動読み上げ">🔊</button>
    <button class="iconbtn" id="parentBtn" title="保護者レポート">👪</button>
  </div>

  <div class="levelrow">
    <div class="lvbadge" id="lvBadge">Lv1</div>
    <div class="lvmeta">
      <div class="t"><span id="lvTitle">たんけん見習い</span> ・ つぎまで <span id="lvRemain">100</span>XP</div>
      <div class="bar"><i id="lvBar"></i></div>
    </div>
  </div>

  <div class="gradesel" id="gradeSel"></div>
  <div class="gradesel" id="levelSel" style="margin-bottom:14px"></div>
  <div class="nowskill" id="nowSkill"></div>
  <div class="stepnote" id="stepNote"></div>

  <div class="card" id="card">
    <div class="tagrow">
      <span class="tag subj" id="tSubj">スキル</span>
      <span class="tag lvl" id="tLvl">習得度</span>
      <span class="tag day" id="tDay">第1問</span>
    </div>
    <div class="hook" id="hook"></div>
    <div class="diawrap" id="diaWrap"></div>
    <div class="qhead">
      <h2 class="q" id="qtext"></h2>
      <button class="speakbtn" id="qSpeak" title="読み上げ">🔊</button>
    </div>
    <div class="choices" id="choices"></div>

    <div class="reveal" id="reveal">
      <div class="verdict" id="verdict"></div>
      <div class="block"><div class="lab expl"><span class="e">🧩</span>図で見ると</div>
        <button class="miniSpeak" data-for="explain">🔊</button><div class="body" id="explain"></div></div>
      <div class="block"><div class="lab real"><span class="e">🌍</span>これ、実生活のどこで使う？</div>
        <button class="miniSpeak" data-for="real">🔊</button><div class="body" id="real"></div></div>
      <div class="block">
        <div class="lab connect"><span class="e">🧭</span>つながる分野</div>
        <div class="connchips" id="connectChips"></div>
      </div>
      <button class="btn" id="nextBtn">つぎの一問へ ▶</button>
      <button class="btn ghost" id="stopBtn">今日はここまでにする</button>
    </div>
  </div>

  <div class="section-title">📈 算数の習得マップ（どこまで進んだ？）</div>
  <div class="skills" id="skillsMap"></div>

  <div class="section-title">🏅 あつめたバッジ</div>
  <div class="badges" id="badges"></div>

  <div class="footer">
    間違えても減点なし。むずかしかったら自動でやさしい問題にもどります。<br>
    問題はその場で作られるので、毎回ちがう数字。進み具合はこの端末に自動保存。<br>
    <a href="#" id="resetLink">▷ さいしょからやり直す</a>
  </div>
</div>

<div class="modal" id="parentModal">
  <div class="sheet">
    <h2>👪 保護者レポート</h2>
    <div class="lead">どこでつまずき、どう声をかけるとよいか。</div>
    <div class="statgrid">
      <div class="stat"><div class="n" id="rWeek">0</div><div class="l">今週やった問題</div></div>
      <div class="stat"><div class="n" id="rTotal">0</div><div class="l">これまで累計</div></div>
      <div class="stat"><div class="n" id="rAcc">0%</div><div class="l">正答率</div></div>
    </div>
    <div style="font-size:13px;font-weight:800;color:var(--sub);margin:6px 2px 10px">📊 スキル別の習得度</div>
    <div id="rSkills"></div>
    <div class="stuck" id="rStuck"></div>
    <div class="voice" id="rVoice"></div>
    <button class="btn ghost" id="parentClose">とじる</button>
  </div>
</div>

<div class="combo" id="comboPop"></div>
<div class="toast" id="toast"></div>

<script src="skills.js"></script>
<script src="topics.js"></script>
<script src="math.js"></script>
<script>
const E=window.ENGINE, SKILLS=E.SKILLS, BAND_ORDER=E.BAND_ORDER, FIELDS=E.FIELDS, META=E.META;
const TRIVIA=E.TRIVIA, CATEGORIES=E.CATEGORIES, MIX_CYCLE=E.MIX_CYCLE, CAT_TRIVIA=E.CAT_TRIVIA;
const $=id=>document.getElementById(id);

const LEVELS=[{min:0,title:"たんけん見習い"},{min:100,title:"ものしりルーキー"},{min:250,title:"ひらめき探検家"},
  {min:450,title:"つながりマスター"},{min:700,title:"ちしきの賢者"},{min:1000,title:"世界をつなぐ者"}];
const BADGES=[
  {id:"first",emoji:"🌱",name:"はじめの一歩",test:s=>s.totalAnswered>=1},
  {id:"streak3",emoji:"🔥",name:"3日れんぞく",test:s=>s.streak>=3},
  {id:"ten",emoji:"🎯",name:"10問とっぱ",test:s=>s.totalAnswered>=10},
  {id:"combo5",emoji:"💎",name:"5問れんしょう",test:s=>s.bestCombo>=5},
  {id:"master1",emoji:"⭐",name:"1スキル達人",test:s=>masteredCount(s)>=1},
  {id:"master3",emoji:"🧭",name:"3スキル達人",test:s=>masteredCount(s)>=3},
  {id:"hundred",emoji:"👑",name:"100問の道",test:s=>s.totalAnswered>=100},
];
function masteredCount(s){return Object.values(s.skills||{}).filter(x=>x.m>=80).length;}

const KEY="kyounoichimon_v3";
function todayStr(){const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function load(){
  let s;try{s=JSON.parse(localStorage.getItem(KEY));}catch(e){s=null;}
  if(!s) s={xp:0,streak:0,lastDay:null,totalAnswered:0,correct:0,combo:0,bestCombo:0,
    badges:[],focus:"mix",level:"all",mixIdx:0,autoRead:false,history:[],skills:{},trivia:{},currentSkill:null,wrongStreak:0,answeredToday:0};
  s.skills=s.skills||{}; s.trivia=s.trivia||{}; s.badges=s.badges||[]; s.history=s.history||[];
  if(!s.focus)s.focus="mix"; if(!s.level)s.level="all"; if(s.mixIdx==null)s.mixIdx=0;
  return s;
}
function save(s){localStorage.setItem(KEY,JSON.stringify(s));}
let S=load();
function mastery(id){return (S.skills[id]&&S.skills[id].m)||0;}
function ensureSkill(id){if(!S.skills[id])S.skills[id]={m:0,att:0,cor:0};return S.skills[id];}

/* ---- 算数：現在スキルの決定（レベル帯の中で、やさしい所→難しい所） ---- */
function mathRange(){ return E.mathRange||{start:1,max:3}; }
function skLv(id){ return (SKILLS[id]&&SKILLS[id].lv)||1; }
function firstUnmastered(){
  const r=mathRange(), list=BAND_ORDER.all;
  // レベル帯内で最初の未習得
  for(const id of list){ const lv=skLv(id); if(lv>=r.start && lv<=r.max && mastery(id)<80) return id; }
  // 帯内が全て習得済みなら、帯内の最後を返す
  const inb=list.filter(id=>{const lv=skLv(id);return lv>=r.start&&lv<=r.max;});
  return inb.length?inb[inb.length-1]:list[0];
}
function fixCurrent(){
  if(!S.currentSkill || !SKILLS[S.currentSkill]) S.currentSkill=firstUnmastered();
}
function trec(id){ if(!S.trivia[id])S.trivia[id]={att:0,cor:0}; return S.trivia[id]; }

/* ---- 音声 ---- */
let speaking=null;
function speak(text,btn){
  if(!("speechSynthesis"in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang="ja-JP"; u.rate=0.95; u.pitch=1.05;
  const vs=window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.indexOf("ja")===0);
  if(vs.length)u.voice=vs[0];
  if(btn)btn.classList.add("playing"); u.onend=()=>{if(btn)btn.classList.remove("playing");};
  window.speechSynthesis.speak(u);
}
if("speechSynthesis"in window)window.speechSynthesis.onvoiceschanged=()=>{};

/* ---- レベル/描画 ---- */
function levelFor(xp){let lv=1,t=LEVELS[0].title,cur=0,next=LEVELS[1].min;
  for(let i=0;i<LEVELS.length;i++)if(xp>=LEVELS[i].min){lv=i+1;t=LEVELS[i].title;cur=LEVELS[i].min;next=(i+1<LEVELS.length)?LEVELS[i+1].min:LEVELS[i].min;}
  return {lv,title:t,cur,next};}
function renderHeader(){
  $("streak").textContent=S.streak; $("xp").textContent=S.xp;
  const L=levelFor(S.xp); $("lvBadge").textContent="Lv"+L.lv; $("lvTitle").textContent=L.title;
  const span=L.next-L.cur,into=S.xp-L.cur;
  $("lvRemain").textContent=(L.next>L.cur)?Math.max(0,L.next-S.xp):"MAX";
  $("lvBar").style.width=(L.next>L.cur?Math.min(100,into/span*100):100)+"%";
}
function renderGradeSel(){
  const box=$("gradeSel"); box.innerHTML="";
  Object.entries(CATEGORIES).forEach(([k,v])=>{
    const d=document.createElement("div"); d.className="gchip"+(S.focus===k?" active":"");
    d.innerHTML=v.emoji+"<small>"+v.name+"</small>";
    d.onclick=()=>{S.focus=k; save(S); renderGradeSel(); renderQuestion(); window.scrollTo({top:0,behavior:"smooth"});};
    box.appendChild(d);
  });
}
function applyLevel(){ // S.level → トリビア出題範囲＋算数ラダーの帯
  const ui=(E.LEVELS_UI&&E.LEVELS_UI[S.level])||null;
  E.levelRange = ui?ui.range:{min:1,max:3};
  E.mathRange = (E.MATH_RANGE&&E.MATH_RANGE[S.level])||{start:1,max:3};
}
function renderLevelSel(){
  const box=$("levelSel"); if(!box||!E.LEVELS_UI)return; box.innerHTML="";
  Object.entries(E.LEVELS_UI).forEach(([k,v])=>{
    const d=document.createElement("div"); d.className="gchip"+(S.level===k?" active":"");
    d.innerHTML=v.emoji+"<small>"+v.name+"</small>";
    d.onclick=()=>{S.level=k; applyLevel(); S.currentSkill=firstUnmastered(); save(S);
      renderLevelSel(); renderQuestion(); window.scrollTo({top:0,behavior:"smooth"});};
    box.appendChild(d);
  });
}
function renderNowSkill(){
  if(!current){$("nowSkill").innerHTML="";return;}
  const extra = current.isMath? `（習得度 ${mastery(current.skillId)}%）` : "（クイズ）";
  $("nowSkill").innerHTML=`<span class="dot"></span>いまのもんだい：<b>${current.label}</b>${extra}`;
}
function renderSkillsMap(){
  const box=$("skillsMap"); box.innerHTML="";
  const list=BAND_ORDER.all; let lastLv=0;
  list.forEach(id=>{
    const sk=SKILLS[id]; if(!sk)return; const lv=sk.lv||1, m=mastery(id), st=S.skills[id];
    if(lv!==lastLv){ lastLv=lv;
      const h=document.createElement("div");
      h.style.cssText="font-size:12px;font-weight:800;color:var(--sub);margin:12px 4px 6px;letter-spacing:.05em;";
      const lab=(E.LADDER_LABEL&&E.LADDER_LABEL[lv])||""; const ico={1:"🌱",2:"🔥",3:"⚡"}[lv]||"";
      h.textContent=`${ico} ${lab}レベル`; box.appendChild(h);
    }
    const weak = st&&st.att>=2 && m<40;
    const isnow = id===S.currentSkill;
    const div=document.createElement("div");
    div.className="srow"+(weak?" weak":"")+(m>=80?" mastered":"");
    if(isnow) div.style.borderColor="var(--accent)";
    const col=m>=80?"var(--good)":m>=40?"var(--blue)":weak?"var(--bad)":"var(--purple)";
    div.innerHTML=`<div class="top"><span class="e">${sk.emoji}</span>${sk.name}${isnow?' <span style="color:var(--accent);font-size:11px">◀ いまここ</span>':''}
      <span class="pct">${m>=80?"達人 ✓":(st&&st.att?m+"%":"未挑戦")}</span></div>
      <div class="track"><i style="width:${m}%;background:${col}"></i></div>`;
    box.appendChild(div);
  });
}
function renderBadges(){
  const box=$("badges"); box.innerHTML="";
  BADGES.forEach(b=>{const got=S.badges.includes(b.id);
    const d=document.createElement("div"); d.className="badge"+(got?" got":"");
    d.innerHTML=`<div class="bcircle">${b.emoji}</div><div class="bname">${b.name}</div>`; box.appendChild(d);});
}
function checkBadges(){let n=[];BADGES.forEach(b=>{if(!S.badges.includes(b.id)&&b.test(S)){S.badges.push(b.id);n.push(b);}});return n;}

/* ---- 問題生成 ---- */
let current=null, answered=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildChoices(p){
  const ansKey=String(p.answer);
  let ds=(p.distractors||[]).map(String).filter(x=>x!==ansKey);
  ds=[...new Set(ds)];
  if(!p.isText){
    // 数値問題：不正値を除外し、足りなければ近い値で補完して4択に
    ds=ds.filter(x=>Number(x)>=0 && x!=="NaN");
    let guard=0;
    while(ds.length<3 && guard++<30){
      const base=Number(p.answer)||0; const cand=String(base+E.R(-3,4));
      if(cand!==ansKey && !ds.includes(cand) && Number(cand)>=0) ds.push(cand);
    }
  }
  // 文字問題：プールにある分だけ（3択でも可）
  return shuffle([ansKey,...ds.slice(0,3)]);
}
/* ---- 科目を決めて1問つくる（ミックスは科目を自動で回す） ---- */
function decideCategory(){
  if(S.focus!=="mix") return S.focus;
  const cat=MIX_CYCLE[S.mixIdx % MIX_CYCLE.length];
  S.mixIdx=(S.mixIdx+1)%MIX_CYCLE.length;
  return cat;
}
function getNext(){
  const cat=decideCategory();
  if(cat==="math"){
    fixCurrent();
    const sk=SKILLS[S.currentSkill]; const p=sk.gen();
    // 生成側が解説等を持っていればそれを使い、無ければ既定で補う
    if(!p.explain) p.explain=`答えは ${p.answer}${p.unit||""}。上の図でいっしょに確かめてみよう。`;
    if(!p.real)    p.real=(META[S.currentSkill]&&META[S.currentSkill].real)||"";
    if(!p.conn)    p.conn=(META[S.currentSkill]&&META[S.currentSkill].conn)||["math"];
    const lvl=E.LADDER_LABEL?(E.LADDER_LABEL[sk.lv||1]+"・"):"";
    return {isMath:true, category:"math", skillId:S.currentSkill, sk, p,
      label:`${sk.emoji} ${lvl}${sk.name}`};
  } else {
    const ids=CAT_TRIVIA[cat]||[]; const tid=ids[Math.floor(Math.random()*ids.length)];
    const t=TRIVIA[tid]; const p=t.gen();
    return {isMath:false, category:cat, triviaId:tid, p,
      label:`${CATEGORIES[cat].emoji} ${CATEGORIES[cat].name}`};
  }
}
function renderQuestion(){
  answered=false;
  current=getNext();
  const p=current.p;
  $("reveal").classList.remove("show");
  $("tSubj").textContent=current.label;
  $("tLvl").textContent=current.isMath?("習得度 "+mastery(current.skillId)+"%"):"クイズ ✨";
  $("tDay").textContent="第"+(S.totalAnswered+1)+"問";
  $("hook").textContent="👀 "+p.hook;
  $("diaWrap").innerHTML = p.diaSVG || E.renderDia(p.dia);
  $("qtext").textContent=p.text;
  const choices=buildChoices(p); current.choices=choices;
  const cbox=$("choices"); cbox.innerHTML="";
  choices.forEach(val=>{
    const btn=document.createElement("button"); btn.className="choice";
    btn.textContent=val+(p.unit||""); btn.dataset.val=val;
    btn.onclick=()=>answer(val,btn); cbox.appendChild(btn);
  });
  renderNowSkill();
  if(S.autoRead) setTimeout(()=>speak(p.hook+"。 "+p.text,$("qSpeak")),250);
}

function answer(val,btn){
  if(answered)return; answered=true;
  const p=current.p, ansKey=String(p.answer), correct=(String(val)===ansKey);
  [...document.querySelectorAll(".choice")].forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===ansKey)b.classList.add("correct");
    else if(b===btn)b.classList.add("wrong"); else b.classList.add("dim");
  });

  S.totalAnswered++;
  const t=todayStr();
  if(S.lastDay!==t){ if(S.lastDay){const diff=Math.round((new Date(t)-new Date(S.lastDay))/86400000); S.streak=(diff===1)?S.streak+1:1;} else S.streak=1; S.lastDay=t; S.answeredToday=0; }
  S.answeredToday=(S.answeredToday||0)+1;

  let gained=0, stepMsg=null, stepUp=false;
  // コンボ・正答率（全科目共通）
  if(correct){ S.correct++; S.combo++; if(S.combo>S.bestCombo)S.bestCombo=S.combo; }
  else S.combo=0;

  if(current.isMath){
    const st=ensureSkill(current.skillId); st.att++;
    if(correct){
      st.cor++; st.m=Math.min(100,st.m+20); S.wrongStreak=0;
      gained=10+Math.min(20,(S.combo-1)*3); showVerdict(true,gained); if(S.combo>=2)popCombo(S.combo);
      if(st.m>=80){ const list=BAND_ORDER.all; const idx=list.indexOf(current.skillId);
        const cap=mathRange().max;
        let nextId=null; for(let i=idx+1;i<list.length;i++){ if(skLv(list[i])<=cap && mastery(list[i])<80){nextId=list[i];break;} }
        if(nextId){ S.currentSkill=nextId;
          const nlv=E.LADDER_LABEL?E.LADDER_LABEL[skLv(nextId)]+"・":"";
          stepMsg=`🎉「${current.sk.name}」マスター！つぎは「${SKILLS[nextId].emoji} ${nlv}${SKILLS[nextId].name}」！`; stepUp=true; }
        else { stepMsg=`🎉「${current.sk.name}」マスター！このレベルの算数は制覇！上のレベルに挑戦してみよう。`; stepUp=true; }
      }
    } else {
      st.m=Math.max(0,st.m-12); S.wrongStreak=(S.wrongStreak||0)+1; gained=4; showVerdict(false,gained);
      if(S.wrongStreak>=2 && current.sk.prereq){
        S.currentSkill=current.sk.prereq; S.wrongStreak=0;
        stepMsg=`🧰 ここは少しむずかしいね。基礎の「${SKILLS[current.sk.prereq].emoji} ${SKILLS[current.sk.prereq].name}」にもどって、できる所から固めよう。`;
      }
    }
    S.history.push({ts:Date.now(),skill:current.skillId,cat:"math",correct});
  } else {
    const tr=trec(current.triviaId); tr.att++; if(correct)tr.cor++;
    if(correct){ gained=8+Math.min(16,(S.combo-1)*3); showVerdict(true,gained); if(S.combo>=2)popCombo(S.combo); }
    else { gained=4; showVerdict(false,gained); }
    S.history.push({ts:Date.now(),skill:"t:"+current.triviaId,cat:current.category,correct});
  }
  S.xp+=gained;
  if(S.history.length>600)S.history=S.history.slice(-600);

  // 解説（図で見ると / 実生活 / つながる分野）
  $("explain").textContent = current.p.explain||"";
  $("real").textContent = current.p.real||"";
  const chips=$("connectChips"); chips.innerHTML="";
  (current.p.conn||[]).forEach(fk=>{const f=FIELDS[fk]; if(!f)return;
    const sp=document.createElement("span"); sp.className="connchip"; sp.textContent=f.emoji+" "+f.name; chips.appendChild(sp);});

  const newly=checkBadges();
  save(S);
  renderHeader(); renderSkillsMap(); renderBadges();

  if(stepMsg){ const n=$("stepNote"); n.className="stepnote show"+(stepUp?" up":""); n.textContent=stepMsg; }
  else $("stepNote").className="stepnote";

  $("reveal").classList.add("show"); $("reveal").scrollIntoView({behavior:"smooth",block:"nearest"});
  if(S.autoRead) setTimeout(()=>speak((correct?"せいかい！":"おしい！")+" "+(current.p.explain||""),null),400);
  if(newly.length) setTimeout(()=>toast("🏅 バッジ獲得！「"+newly[0].name+"」"),700);
}
function showVerdict(ok,xp){
  const v=$("verdict"); v.className="verdict "+(ok?"ok":"ng");
  v.innerHTML=ok?`<span class="big">🎉</span> せいかい！　<span style="color:var(--accent)">+${xp}XP</span>`
    :`<span class="big">💪</span> おしい！“挑戦XP” <span style="color:var(--accent)">+${xp}</span> ゲット`;
}
function popCombo(n){const p=$("comboPop");p.textContent=n+" コンボ！🔥";p.classList.remove("go");void p.offsetWidth;p.classList.add("go");}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove("show"),2600);}

/* ---- 保護者レポート ---- */
const PARENT_TIP={
  general_low:"今は<b>正解より「触れた回数」</b>が大事な時期。できた問題数そのものを褒めてあげてください。",
  general_ok:"順調です。<b>むずかしい問題に挑戦した</b>こと自体を具体的に言葉にして褒めると、挑戦が好きになります。",
};
function openParent(){
  const week=Date.now()-7*86400000, wk=S.history.filter(h=>h.ts>=week);
  $("rWeek").textContent=wk.length; $("rTotal").textContent=S.totalAnswered;
  const acc=S.totalAnswered?Math.round(S.correct/S.totalAnswered*100):0; $("rAcc").textContent=acc+"%";

  // スキル別習得度
  const box=$("rSkills"); box.innerHTML="";
  const tried=BAND_ORDER.all.filter(id=>S.skills[id]&&S.skills[id].att>0);
  if(tried.length===0) box.innerHTML='<div style="color:var(--sub);font-size:13px">まだ記録がありません。1問やってみましょう。</div>';
  tried.forEach(id=>{const sk=SKILLS[id],m=mastery(id),st=S.skills[id];
    const col=m>=80?"var(--good)":m>=40?"var(--blue)":"var(--bad)";
    const d=document.createElement("div"); d.className="repbar";
    d.innerHTML=`<div class="top"><span>${sk.emoji} ${sk.name}</span><span>${m}%（${st.cor}/${st.att}正解）</span></div>
      <div class="track"><i style="width:${m}%;background:${col}"></i></div>`; box.appendChild(d);
  });

  // つまずきポイント＝挑戦したのに習得度が低いスキル
  const weak=tried.filter(id=>S.skills[id].att>=2 && mastery(id)<40)
    .sort((a,b)=>mastery(a)-mastery(b));
  const stuckEl=$("rStuck"), voiceEl=$("rVoice");
  if(weak.length){
    const id=weak[0], sk=SKILLS[id];
    stuckEl.style.display="block";
    stuckEl.innerHTML=`📍 <b>つまずきポイント：${sk.emoji} ${sk.name}</b><br>`+
      `何度か挑戦していますが習得度 ${mastery(id)}%。アプリは自動で前の「${sk.prereq?SKILLS[sk.prereq].name:"基礎"}」に戻して練習させています。`;
    voiceEl.innerHTML=`🗣 <b>声がけのヒント</b><br>${sk.hint}`;
  } else {
    stuckEl.style.display="none";
    // いま伸びてるスキルを褒める材料に
    const best=tried.slice().sort((a,b)=>mastery(b)-mastery(a))[0];
    let v = acc>=70?PARENT_TIP.general_ok:PARENT_TIP.general_low;
    if(best) v=`🗣 <b>声がけのヒント</b><br>いま <b>${SKILLS[best].emoji}${SKILLS[best].name}</b> が伸びています（習得度${mastery(best)}%）。「${SKILLS[best].name}、できるようになってきたね」と具体的に伝えるのが効果的。<br>`+v;
    voiceEl.innerHTML=v;
  }
  $("parentModal").classList.add("show");
}

/* ---- ボタン ---- */
$("nextBtn").onclick=()=>{$("stepNote").className="stepnote"; renderQuestion(); window.scrollTo({top:0,behavior:"smooth"});};
$("stopBtn").onclick=()=>{ if("speechSynthesis"in window)window.speechSynthesis.cancel();
  $("card").innerHTML=`<div class="done"><div class="big">🌙</div><h2>今日もよくがんばったね</h2>
    <p>今日は <b>${S.answeredToday}問</b> ／ つうさん <b>${S.totalAnswered}問</b><br>XP <b>${S.xp}</b>・連続 <b>${S.streak}日</b><br><br>また明日、新しい一問が待ってるよ。</p>
    <button class="btn" onclick="location.reload()">もう一問やる ▶</button></div>`;
  window.scrollTo({top:0,behavior:"smooth"});};
$("qSpeak").onclick=()=>speak(current.p.hook+"。 "+current.p.text+"。 "+current.choices.map(c=>c+(current.p.unit||"")).join("、 "),$("qSpeak"));
document.querySelectorAll(".miniSpeak").forEach(b=>{b.onclick=()=>speak($(b.dataset.for).textContent,null);});
$("autoReadBtn").onclick=()=>{S.autoRead=!S.autoRead;save(S);$("autoReadBtn").classList.toggle("on",S.autoRead);toast(S.autoRead?"🔊 自動読み上げ ON":"🔇 自動読み上げ OFF");};
$("parentBtn").onclick=openParent;
$("parentClose").onclick=()=>$("parentModal").classList.remove("show");
$("parentModal").onclick=e=>{if(e.target.id==="parentModal")$("parentModal").classList.remove("show");};
$("resetLink").onclick=e=>{e.preventDefault();if(confirm("進み具合を全部消して、さいしょからやり直す？")){localStorage.removeItem(KEY);location.reload();}};

/* 初期化 */
fixCurrent(); applyLevel();
$("autoReadBtn").classList.toggle("on",S.autoRead);
renderHeader(); renderGradeSel(); renderLevelSel(); renderSkillsMap(); renderBadges(); renderQuestion();
</script>
