<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>今日の一問 — きみ専用のれんしゅう</title>
<style>
  :root{
    --ink:#26335f; --sub:#7886b5; --card:#ffffff; --card2:#f6f9ff; --line:#e4eafa;
    --accent:#ff8a2b; --accent2:#ffb43c; --good:#13c08a; --bad:#ff5d7e;
    --blue:#3b82f6; --green:#22c55e; --purple:#8b5cf6; --pink:#ec4899;
    --subj:#3b82f6; --subjbg:#e7f0ff;
    --shadow:0 12px 30px rgba(70,90,170,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
    background:linear-gradient(165deg,#e9f2ff 0%,#fdeefb 55%,#fff5e8 100%);
    background-attachment:fixed; color:var(--ink); min-height:100vh; line-height:1.7; overflow-x:hidden;}
  /* ふわふわ動く背景の図形 */
  .blob{position:fixed; border-radius:50%; filter:blur(8px); opacity:.35; z-index:0; pointer-events:none;}
  .blob.b1{width:200px;height:200px;background:#9ec8ff;top:-40px;left:-50px;animation:float1 13s ease-in-out infinite;}
  .blob.b2{width:160px;height:160px;background:#ffc6ec;top:30%;right:-40px;animation:float2 16s ease-in-out infinite;}
  .blob.b3{width:170px;height:170px;background:#ffe39e;bottom:-30px;left:10%;animation:float1 18s ease-in-out infinite;}
  .blob.b4{width:120px;height:120px;background:#bfeacb;top:55%;left:-30px;animation:float2 12s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(30px) translateX(18px);}}
  @keyframes float2{0%,100%{transform:translateY(0) translateX(0);}50%{transform:translateY(-26px) translateX(-16px);}}
  .wrap{max-width:560px;margin:0 auto;padding:14px 16px 70px;position:relative;z-index:1;}

  .topbar{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
  .logo{font-weight:900;font-size:19px;color:#2a3566;}
  .logo small{display:block;font-size:11px;color:var(--sub);font-weight:700;}
  .spacer{flex:1;}
  .pill{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);
    border-radius:999px;padding:6px 12px;font-weight:800;font-size:13px;box-shadow:0 3px 10px rgba(70,90,170,.08);}
  .pill.flame{color:#ff7a1a;} .pill.xp{color:#f5a300;}
  .iconbtn{width:38px;height:38px;border-radius:13px;background:#fff;border:1.5px solid var(--line);
    color:var(--ink);font-size:17px;cursor:pointer;display:grid;place-items:center;box-shadow:0 3px 10px rgba(70,90,170,.08);transition:transform .12s;}
  .iconbtn:active{transform:scale(.92);} .iconbtn.on{background:#e7f0ff;border-color:var(--blue);}

  .levelrow{display:flex;align-items:center;gap:10px;margin:2px 2px 14px;}
  .lvbadge{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:15px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 5px 14px rgba(255,138,43,.4);flex:none;
    animation:bob 3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  .lvmeta{flex:1;} .lvmeta .t{font-size:12px;color:var(--sub);font-weight:800;}
  .bar{height:11px;background:#e9eefb;border-radius:999px;overflow:hidden;margin-top:5px;border:1px solid var(--line);}
  .bar>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--good),var(--blue));border-radius:999px;transition:width .7s cubic-bezier(.2,.9,.2,1);
    background-size:200% 100%;animation:shimmer 2.5s linear infinite;}
  @keyframes shimmer{to{background-position:200% 0;}}

  .gradesel{display:flex;gap:7px;margin:0 2px 10px;flex-wrap:wrap;}
  .gchip{flex:1;min-width:62px;text-align:center;padding:8px 4px;border-radius:14px;cursor:pointer;
    background:#fff;border:1.5px solid var(--line);font-weight:800;font-size:13px;color:var(--sub);transition:transform .12s,background .15s;box-shadow:0 2px 8px rgba(70,90,170,.06);}
  .gchip:active{transform:scale(.95);}
  .gchip small{display:block;font-size:10px;font-weight:700;opacity:.85;}
  .gchip.active{background:linear-gradient(135deg,#fff3df,#ffe7c4);border-color:var(--accent);color:#b8651a;box-shadow:0 4px 12px rgba(255,138,43,.25);}

  .nowskill{display:flex;align-items:center;gap:8px;margin:6px 2px 10px;font-size:12.5px;color:var(--sub);font-weight:800;}
  .nowskill .dot{width:9px;height:9px;border-radius:50%;background:var(--good);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:.5;}}
  .nowskill b{color:var(--ink);}
  .stepnote{background:#fff3e2;border:1.5px solid #ffcf96;color:#b86316;border-radius:14px;padding:10px 13px;font-size:12.5px;font-weight:800;margin:0 2px 12px;display:none;}
  .stepnote.show{display:block;animation:pop .5s cubic-bezier(.2,1.3,.4,1);}
  .stepnote.up{background:#e3fbef;border-color:#9be9c6;color:#0c8a5e;}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:26px;padding:18px 18px 20px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;border-top:6px solid var(--subj);}
  .card.pop{animation:cardPop .5s cubic-bezier(.2,1.2,.35,1);}
  @keyframes cardPop{0%{opacity:0;transform:translateY(18px) scale(.97);}100%{opacity:1;transform:translateY(0) scale(1);}}

  /* 教科バナー */
  .subjbanner{display:flex;align-items:center;gap:12px;background:var(--subjbg);border:1.5px solid var(--subj);
    border-radius:18px;padding:11px 14px;margin-bottom:14px;}
  .sb-emoji{width:50px;height:50px;border-radius:14px;background:#fff;display:grid;place-items:center;font-size:28px;flex:none;
    box-shadow:0 3px 10px rgba(70,90,170,.12);animation:bob 2.6s ease-in-out infinite;}
  .sb-main{flex:1;min-width:0;}
  .sb-subj{font-size:16px;font-weight:900;color:var(--subj);line-height:1.3;}
  .sb-field{font-size:13px;font-weight:700;color:var(--ink);opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sb-grade{flex:none;background:var(--subj);color:#fff;font-weight:900;font-size:15px;padding:7px 13px;border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.12);text-align:center;line-height:1.1;}
  .sb-grade small{display:block;font-size:9px;font-weight:700;opacity:.9;}

  .tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .tag{font-size:11.5px;font-weight:800;padding:4px 11px;border-radius:999px;}
  .tag.lvl{background:#e3fbef;color:#0c8a5e;border:1px solid #9be9c6;}
  .tag.day{background:#fff3df;color:#b8651a;border:1px solid #ffcf96;}
  .hook{font-size:13.5px;color:#e67a16;font-weight:800;margin-bottom:10px;}

  .diawrap{background:#f3f7ff;border:1.5px solid var(--line);border-radius:18px;padding:10px;margin-bottom:14px;
    box-shadow:inset 0 2px 8px rgba(70,90,170,.05);}
  .qhead{display:flex;align-items:flex-start;gap:10px;}
  .q{font-size:22px;font-weight:900;line-height:1.5;margin:0 0 16px;flex:1;color:#222a4d;}
  .speakbtn{flex:none;width:36px;height:36px;border-radius:12px;border:1.5px solid var(--line);
    background:#eef4ff;color:var(--blue);font-size:17px;cursor:pointer;margin-top:2px;transition:transform .1s;}
  .speakbtn:active{transform:scale(.9);} .speakbtn.playing{background:#dbe9ff;border-color:var(--blue);animation:pulse 1s infinite;}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .choice{display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:2.5px solid var(--line);
    border-radius:18px;padding:16px 12px;font-size:19px;font-weight:900;cursor:pointer;color:#2a3566;min-height:60px;
    box-shadow:0 4px 0 #e4eafa;transition:transform .12s,border-color .15s,background .15s,box-shadow .12s;}
  .choice:active{transform:translateY(3px);box-shadow:0 1px 0 #e4eafa;}
  .choice:hover{border-color:var(--subj);}
  .choice.correct{border-color:var(--good);background:#e3fbef;box-shadow:0 4px 0 #9be9c6;animation:rightPop .5s cubic-bezier(.2,1.4,.4,1);}
  @keyframes rightPop{0%{transform:scale(1);}40%{transform:scale(1.08);}100%{transform:scale(1);}}
  .choice.wrong{border-color:var(--bad);background:#ffe9ef;box-shadow:0 4px 0 #ffc2d2;animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
  .choice.dim{opacity:.4;} .choice[disabled]{cursor:default;}

  .reveal{margin-top:16px;display:none;}
  .reveal.show{display:block;animation:pop .5s cubic-bezier(.2,1.2,.4,1);}
  @keyframes pop{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .verdict{display:flex;align-items:center;gap:10px;font-weight:900;font-size:19px;margin-bottom:12px;}
  .verdict.ok{color:#0c8a5e;} .verdict.ng{color:#d63a5e;} .verdict .big{font-size:30px;animation:rightPop .6s;}
  .block{background:#f6f9ff;border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:11px;position:relative;}
  .block .lab{font-size:11.5px;font-weight:900;letter-spacing:.04em;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .block .lab .e{font-size:16px;} .block .body{font-size:14.5px;color:#3a4670;font-weight:500;}
  .lab.expl{color:#2f7bf6;} .lab.real{color:#16a065;} .lab.connect{color:#8b5cf6;}
  .miniSpeak{position:absolute;top:11px;right:11px;width:30px;height:30px;border-radius:9px;
    border:1.5px solid var(--line);background:#eef4ff;color:var(--blue);font-size:14px;cursor:pointer;}
  .connchips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .connchip{font-size:12px;font-weight:800;padding:6px 11px;border-radius:999px;background:#f0e9ff;border:1.5px solid #d6c8ff;color:#7a4fd6;}

  .combo{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%) scale(.6);font-size:42px;font-weight:900;
    color:#ff7a1a;text-shadow:0 4px 18px rgba(255,138,43,.5);opacity:0;pointer-events:none;z-index:60;}
  .combo.go{animation:comboPop 1s ease forwards;}
  @keyframes comboPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.6) rotate(-8deg);}
    20%{opacity:1;transform:translate(-50%,-70%) scale(1.2) rotate(4deg);}100%{opacity:0;transform:translate(-50%,-130%) scale(1) rotate(0);}}

  .btn{display:block;width:100%;text-align:center;border:none;border-radius:18px;padding:16px;font-size:16px;font-weight:900;
    cursor:pointer;margin-top:8px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 6px 0 #e07414;transition:transform .1s,box-shadow .1s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #e07414;}
  .btn.ghost{background:#fff;color:var(--sub);box-shadow:0 4px 0 #e4eafa;border:1.5px solid var(--line);}
  .btn.ghost:active{box-shadow:0 1px 0 #e4eafa;}

  .section-title{font-size:15px;font-weight:900;color:#3a4670;margin:26px 6px 12px;display:flex;align-items:center;gap:8px;}
  .skills{display:flex;flex-direction:column;gap:9px;}
  .srow{background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:11px 13px;box-shadow:0 2px 8px rgba(70,90,170,.05);}
  .srow .top{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13.5px;margin-bottom:7px;color:var(--ink);}
  .srow .e{font-size:17px;} .srow .pct{margin-left:auto;font-size:12px;color:var(--sub);}
  .srow .track{height:9px;background:#e9eefb;border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .srow .track>i{display:block;height:100%;border-radius:999px;transition:width .6s;}
  .srow.weak{border-color:#ffc2d2;} .srow.mastered .pct{color:var(--good);font-weight:900;}
  .badges{display:flex;gap:10px;flex-wrap:wrap;}
  .badge{width:62px;text-align:center;}
  .badge .bcircle{width:56px;height:56px;border-radius:50%;margin:0 auto 5px;display:grid;place-items:center;font-size:26px;
    background:#f1f4ff;border:2px solid var(--line);filter:grayscale(1);opacity:.45;}
  .badge.got .bcircle{filter:none;opacity:1;border-color:var(--accent);background:#fff4e2;box-shadow:0 5px 14px rgba(255,138,43,.3);animation:bob 3s ease-in-out infinite;}
  .badge .bname{font-size:10px;color:var(--sub);font-weight:800;line-height:1.3;}
  .footer{text-align:center;color:var(--sub);font-size:11.5px;margin-top:30px;line-height:1.8;}
  .footer a{color:var(--blue);text-decoration:none;font-weight:700;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(30px);background:#fff;
    border:1.5px solid var(--line);color:var(--ink);padding:12px 18px;border-radius:16px;font-weight:800;font-size:14px;
    box-shadow:var(--shadow);opacity:0;transition:.35s;z-index:70;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .done{text-align:center;padding:30px 10px;} .done .big{font-size:50px;margin-bottom:6px;animation:bob 2.5s ease-in-out infinite;}
  .done h2{margin:6px 0;font-size:21px;color:var(--ink);} .done p{color:var(--sub);font-size:14px;font-weight:600;}
  .hidden{display:none !important;}

  /* マスコット */
  .mascot{position:fixed;right:14px;bottom:16px;font-size:46px;z-index:55;pointer-events:none;
    filter:drop-shadow(0 6px 10px rgba(70,90,170,.3));animation:bob 2.4s ease-in-out infinite;transition:transform .2s;}
  .mascot.react{animation:mascotReact .8s cubic-bezier(.2,1.3,.4,1);}
  @keyframes mascotReact{0%{transform:scale(1) rotate(0);}30%{transform:scale(1.35) rotate(-10deg);}60%{transform:scale(1.15) rotate(8deg);}100%{transform:scale(1) rotate(0);}}

  /* 紙吹雪 */
  .confetti{position:fixed;top:-12px;width:11px;height:14px;z-index:65;pointer-events:none;border-radius:2px;opacity:.95;}
  @keyframes fall{to{transform:translateY(108vh) rotate(640deg);opacity:.9;}}

  .modal{position:fixed;inset:0;background:rgba(40,55,110,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;backdrop-filter:blur(2px);}
  .modal.show{display:flex;}
  .sheet{width:100%;max-width:520px;background:#fff;border:1.5px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow);animation:cardPop .4s;}
  .sheet h2{margin:0 0 4px;font-size:20px;color:var(--ink);} .sheet .lead{color:var(--sub);font-size:12.5px;margin-bottom:16px;font-weight:600;}
  .statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat{background:#f6f9ff;border:1.5px solid var(--line);border-radius:15px;padding:12px 8px;text-align:center;}
  .stat .n{font-size:23px;font-weight:900;color:var(--accent);} .stat .l{font-size:11px;color:var(--sub);font-weight:800;margin-top:2px;}
  .repbar{margin-bottom:9px;}
  .repbar .top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:800;margin-bottom:4px;color:var(--ink);}
  .repbar .track{height:11px;background:#e9eefb;border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .repbar .track>i{display:block;height:100%;border-radius:999px;}
  .stuck{background:#ffe9ef;border:1.5px solid #ffc2d2;border-radius:15px;padding:13px 15px;font-size:13px;color:#b33a55;margin:12px 0;font-weight:600;}
  .voice{background:#e7f0ff;border:1.5px solid #b9d3ff;border-radius:15px;padding:13px 15px;font-size:13px;color:#2f5bb0;margin:12px 0;font-weight:600;}
  .voice b,.stuck b{color:var(--ink);}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div>
<div class="mascot" id="mascot">🦊</div>
<div class="wrap">
  <div class="topbar">
    <div class="logo">今日の一問<small>きみ専用のれんしゅう</small></div>
    <div class="spacer"></div>
    <div class="pill flame"><span>🔥</span><span id="streak">0</span></div>
    <div class="pill xp"><span>⭐</span><span id="xp">0</span></div>
    <button class="iconbtn" id="autoReadBtn" title="自動読み上げ">🔊</button>
    <button class="iconbtn" id="parentBtn" title="保護者レポート">👪</button>
  </div>

  <div class="levelrow">
    <div class="lvbadge" id="lvBadge">Lv1</div>
    <div class="lvmeta">
      <div class="t"><span id="lvTitle">たんけん見習い</span> ・ つぎまで <span id="lvRemain">100</span>XP</div>
      <div class="bar"><i id="lvBar"></i></div>
    </div>
  </div>

  <div class="gradesel" id="gradeSel"></div>
  <div class="gradesel" id="levelSel" style="margin-bottom:14px"></div>
  <div class="nowskill" id="nowSkill"></div>
  <div class="stepnote" id="stepNote"></div>

  <div class="card" id="card">
    <div class="subjbanner" id="subjBanner">
      <div class="sb-emoji" id="sbEmoji">🔢</div>
      <div class="sb-main">
        <div class="sb-subj" id="sbSubj">算数・数学</div>
        <div class="sb-field" id="sbField">たし算</div>
      </div>
      <div class="sb-grade" id="sbGrade">小1<small>レベル</small></div>
    </div>
    <div class="tagrow">
      <span class="tag day" id="tDay">第1問</span>
      <span class="tag lvl" id="tLvl">習得度</span>
    </div>
    <div class="hook" id="hook"></div>
    <div class="diawrap" id="diaWrap"></div>
    <div class="qhead">
      <h2 class="q" id="qtext"></h2>
      <button class="speakbtn" id="qSpeak" title="読み上げ">🔊</button>
    </div>
    <div class="choices" id="choices"></div>

    <div class="reveal" id="reveal">
      <div class="verdict" id="verdict"></div>
      <div class="block"><div class="lab expl"><span class="e">🧩</span>図で見ると</div>
        <button class="miniSpeak" data-for="explain">🔊</button><div class="body" id="explain"></div></div>
      <div class="block"><div class="lab real"><span class="e">🌍</span>これ、実生活のどこで使う？</div>
        <button class="miniSpeak" data-for="real">🔊</button><div class="body" id="real"></div></div>
      <div class="block">
        <div class="lab connect"><span class="e">🧭</span>つながる分野</div>
        <div class="connchips" id="connectChips"></div>
      </div>
      <button class="btn" id="nextBtn">つぎの一問へ ▶</button>
      <button class="btn ghost" id="stopBtn">今日はここまでにする</button>
    </div>
  </div>

  <div class="section-title">📈 算数の習得マップ（どこまで進んだ？）</div>
  <div class="skills" id="skillsMap"></div>

  <div class="section-title">🏅 あつめたバッジ</div>
  <div class="badges" id="badges"></div>

  <div class="footer">
    間違えても減点なし。むずかしかったら自動でやさしい問題にもどります。<br>
    問題はその場で作られるので、毎回ちがう数字。進み具合はこの端末に自動保存。<br>
    <a href="#" id="resetLink">▷ さいしょからやり直す</a>
  </div>
</div>

<div class="modal" id="parentModal">
  <div class="sheet">
    <h2>👪 保護者レポート</h2>
    <div class="lead">どこでつまずき、どう声をかけるとよいか。</div>
    <div class="statgrid">
      <div class="stat"><div class="n" id="rWeek">0</div><div class="l">今週やった問題</div></div>
      <div class="stat"><div class="n" id="rTotal">0</div><div class="l">これまで累計</div></div>
      <div class="stat"><div class="n" id="rAcc">0%</div><div class="l">正答率</div></div>
    </div>
    <div style="font-size:13px;font-weight:800;color:var(--sub);margin:6px 2px 10px">📊 スキル別の習得度</div>
    <div id="rSkills"></div>
    <div class="stuck" id="rStuck"></div>
    <div class="voice" id="rVoice"></div>
    <button class="btn ghost" id="parentClose">とじる</button>
  </div>
</div>

<div class="combo" id="comboPop"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   今日の一問 — スキル定義＋問題ジェネレーター＋図解生成
   ・固定問題集ではなく、毎回その場で問題を生成する
   ・答えの位置はエンジン側でシャッフル（正解は1に偏らない）
   ・各問題に図解(SVG)を自動生成
   ・prereq（前提スキル）で、間違えたら簡単な所まで戻れる
   ============================================================ */
(function(){
  const COL = {blue:"#3b82f6",green:"#22b964",pink:"#ec4899",amber:"#f5a300",
    orange:"#ff8e3c",purple:"#8b5cf6",teal:"#10b6a0",red:"#ff5d7e",grid:"#cdd9f5",ink:"#2b3a66",sub:"#8a96c4"};

  const R = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const uniq = a => [...new Set(a)];

  /* ---------- 図解 SVG 生成 ----------
     d.type に応じて絵を返す。viewBox 320x180 を基本とする。 */
  function svg(inner, h){ return `<svg viewBox="0 0 320 ${h||180}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">${inner}</svg>`; }

  function diaDots(p){ // 2グループのドット（たし算）/ 1グループ＋×（ひき算）
    const r=14, gap=34, perRow=6, pad=26; let x=pad,y=40,inner="";
    const draw=(n,color,crossFrom)=>{
      for(let i=0;i<n;i++){
        const cx=x+(i%perRow)*gap, cy=y+Math.floor(i/perRow)*gap;
        inner+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" opacity="${crossFrom!=null&&i>=crossFrom?0.25:0.95}"/>`;
        if(crossFrom!=null&&i>=crossFrom)
          inner+=`<line x1="${cx-r}" y1="${cy-r}" x2="${cx+r}" y2="${cy+r}" stroke="${COL.red}" stroke-width="4"/>
                  <line x1="${cx+r}" y1="${cy-r}" x2="${cx-r}" y2="${cy+r}" stroke="${COL.red}" stroke-width="4"/>`;
      }
    };
    if(p.b!=null && p.cross==null){ // たし算: a個＋b個
      draw(p.a, COL.blue);
      const rows=Math.ceil(p.a/perRow); y=40+rows*gap+10;
      inner+=`<text x="160" y="${y-gap+2}" fill="${COL.sub}" font-size="20" text-anchor="middle">＋</text>`;
      y+=4; draw(p.b, COL.amber);
      return svg(inner, y+30);
    } else { // ひき算: a個のうち後ろからb個に×
      draw(p.a, COL.blue, p.a-p.cross);
      const rows=Math.ceil(p.a/perRow);
      return svg(inner, 40+rows*gap+20);
    }
  }

  function diaNumberline(p){ // 数直線：from から +d / -d
    const x0=24,x1=296,W=x1-x0, max=p.max, y=110;
    const sx=v=>x0+(v/max)*W;
    let inner=`<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="${COL.sub}" stroke-width="2"/>`;
    for(let v=0;v<=max;v+=p.step){ const X=sx(v);
      inner+=`<line x1="${X}" y1="${y-6}" x2="${X}" y2="${y+6}" stroke="${COL.sub}" stroke-width="2"/>
              <text x="${X}" y="${y+24}" fill="${COL.sub}" font-size="11" text-anchor="middle">${v}</text>`; }
    const A=sx(p.from), B=sx(p.to), mid=(A+B)/2, top=y-34;
    inner+=`<path d="M${A} ${y-4} Q ${mid} ${top} ${B} ${y-4}" fill="none" stroke="${p.add?COL.green:COL.orange}" stroke-width="3" marker-end="url(#ah)"/>
      <defs><marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${p.add?COL.green:COL.orange}"/></marker></defs>
      <text x="${mid}" y="${top-4}" fill="${p.add?COL.green:COL.orange}" font-size="13" text-anchor="middle" font-weight="700">${p.add?'＋':'−'}${p.amt}</text>
      <circle cx="${A}" cy="${y}" r="5" fill="${COL.blue}"/>`;
    return svg(inner,150);
  }

  function diaArray(p){ // かけ算の格子 a行 × b列
    const cell=Math.min(26, 200/Math.max(p.a,p.b)), gap=cell+4, x0=40,y0=24, r=cell/2-3;
    let inner="";
    for(let i=0;i<p.a;i++)for(let j=0;j<p.b;j++)
      inner+=`<circle cx="${x0+j*gap}" cy="${y0+i*gap}" r="${r>4?r:4}" fill="${COL.purple}"/>`;
    const h=y0+p.a*gap+10, w=x0+p.b*gap;
    inner+=`<text x="${x0-16}" y="${y0+(p.a*gap)/2}" fill="${COL.sub}" font-size="13" text-anchor="middle">${p.a}行</text>
            <text x="${x0+(p.b*gap)/2-gap/2}" y="${y0-8}" fill="${COL.sub}" font-size="13" text-anchor="middle">${p.b}列</text>`;
    return svg(inner, h<120?120:h);
  }

  function diaGroups(p){ // わり算：total個を g グループに均等配分
    const per=p.total/p.g, r=11, x0=30, gw=Math.min(120,(280)/p.g - 6), y0=30;
    let inner="";
    for(let k=0;k<p.g;k++){
      const gx=x0+k*(gw+8);
      inner+=`<rect x="${gx-6}" y="${y0-6}" width="${gw}" height="${gw}" rx="10" fill="none" stroke="${COL.grid}" stroke-width="2"/>`;
      const cols=Math.ceil(Math.sqrt(per));
      for(let i=0;i<per;i++){
        const cx=gx+8+(i%cols)*(r*1.7), cy=y0+8+Math.floor(i/cols)*(r*1.7);
        inner+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${COL.teal}"/>`;
      }
      inner+=`<text x="${gx-6+gw/2}" y="${y0+gw+14}" fill="${COL.sub}" font-size="11" text-anchor="middle">グループ${k+1}</text>`;
    }
    return svg(inner, 160);
  }

  function diaPie(p){ // 円グラフ n等分のうち k個に色
    const cx=160,cy=88,rad=66, n=p.n, k=p.k; let inner="";
    for(let i=0;i<n;i++){
      const a0=(i/n)*2*Math.PI - Math.PI/2, a1=((i+1)/n)*2*Math.PI - Math.PI/2;
      const x0=cx+rad*Math.cos(a0), y0=cy+rad*Math.sin(a0);
      const x1=cx+rad*Math.cos(a1), y1=cy+rad*Math.sin(a1);
      const large=(a1-a0)>Math.PI?1:0;
      inner+=`<path d="M${cx} ${cy} L${x0.toFixed(1)} ${y0.toFixed(1)} A${rad} ${rad} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} Z"
        fill="${i<k?COL.pink:'#e6ecfb'}" stroke="#b7c4e8" stroke-width="2"/>`;
    }
    return svg(inner,176);
  }

  function diaPropbar(p){ // 割合バー：total分割のうち part個に色 ＋ 100スケール対応
    const x0=24,x1=296,W=x1-x0,y=46,h=30, seg=W/p.total;
    let inner=`<text x="24" y="30" fill="${COL.sub}" font-size="12">全体を ${p.total} に分けたうち ${p.part} 個</text>`;
    for(let i=0;i<p.total;i++)
      inner+=`<rect x="${x0+i*seg}" y="${y}" width="${seg-1.5}" height="${h}" rx="3"
        fill="${i<p.part?COL.green:'#e6ecfb'}" stroke="#b7c4e8"/>`;
    // 100スケール
    const y2=110;
    inner+=`<text x="24" y="${y2-8}" fill="${COL.sub}" font-size="12">同じ割合を「100」で見ると…</text>
      <rect x="${x0}" y="${y2}" width="${W}" height="${h}" rx="5" fill="#e6ecfb" stroke="${COL.grid}"/>
      <rect x="${x0}" y="${y2}" width="${(p.part/p.total)*W}" height="${h}" rx="5" fill="${COL.amber}"/>
      <text x="${x0+(p.part/p.total)*W/2}" y="${y2+20}" fill="#2a1c00" font-size="13" font-weight="800" text-anchor="middle">?%</text>`;
    return svg(inner,160);
  }

  function diaBars(p){ // 平均：複数の棒＋平均線
    const x0=44,base=130, bw=40, gap=22, maxV=Math.max(...p.vals)*1.15;
    const sh=v=>(v/maxV)*92;
    let inner=`<line x1="30" y1="${base}" x2="300" y2="${base}" stroke="${COL.sub}" stroke-width="2"/>`;
    p.vals.forEach((v,i)=>{ const x=x0+i*(bw+gap), hh=sh(v);
      inner+=`<rect x="${x}" y="${base-hh}" width="${bw}" height="${hh}" rx="5" fill="${COL.blue}"/>
              <text x="${x+bw/2}" y="${base-hh-6}" fill="${COL.ink}" font-size="13" text-anchor="middle" font-weight="700">${v}</text>
              <text x="${x+bw/2}" y="${base+16}" fill="${COL.sub}" font-size="11" text-anchor="middle">${i+1}回目</text>`;
    });
    const ay=base-sh(p.avg);
    inner+=`<line x1="34" y1="${ay}" x2="300" y2="${ay}" stroke="${COL.amber}" stroke-width="2" stroke-dasharray="6 4"/>
            <text x="300" y="${ay-5}" fill="${COL.amber}" font-size="12" text-anchor="end" font-weight="700">平均 ?</text>`;
    return svg(inner,150);
  }

  function diaClock(p){ // 時計：h時0分
    const cx=160,cy=90,rad=72; let inner=`<circle cx="${cx}" cy="${cy}" r="${rad}" fill="#eef3ff" stroke="${COL.grid}" stroke-width="4"/>`;
    for(let i=1;i<=12;i++){ const a=(i/12)*2*Math.PI-Math.PI/2;
      inner+=`<text x="${cx+(rad-16)*Math.cos(a)}" y="${cy+(rad-16)*Math.sin(a)+5}" fill="${COL.ink}" font-size="14" text-anchor="middle" font-weight="700">${i}</text>`; }
    const ha=(p.h%12)/12*2*Math.PI-Math.PI/2; // 短針
    inner+=`<line x1="${cx}" y1="${cy}" x2="${cx+34*Math.cos(ha)}" y2="${cy+34*Math.sin(ha)}" stroke="${COL.orange}" stroke-width="6" stroke-linecap="round"/>`;
    const ma=-Math.PI/2; // 長針 12
    inner+=`<line x1="${cx}" y1="${cy}" x2="${cx+52*Math.cos(ma)}" y2="${cy+52*Math.sin(ma)}" stroke="${COL.blue}" stroke-width="4" stroke-linecap="round"/>
            <circle cx="${cx}" cy="${cy}" r="5" fill="${COL.amber}"/>`;
    return svg(inner,180);
  }

  function diaCoins(p){ // お金：コインを並べる
    const order=[500,100,50,10,5,1]; const colMap={500:COL.amber,100:"#c9cdd6",50:"#c9cdd6",10:COL.orange,5:COL.amber,1:"#c9cdd6"};
    let x=40,y=50,inner=""; let idx=0;
    order.forEach(v=>{ const c=p.coins[v]||0; for(let i=0;i<c;i++){
      inner+=`<circle cx="${x}" cy="${y}" r="20" fill="${colMap[v]}" stroke="#b7c4e8" stroke-width="2"/>
              <text x="${x}" y="${y+5}" fill="#1a1a1a" font-size="13" text-anchor="middle" font-weight="800">${v}</text>`;
      idx++; x+=48; if(x>290){x=40;y+=52;} } });
    return svg(inner, y+40);
  }

  function diaEmoji(p){ // 大きな絵文字（国旗・動物など）／サブ文字つき
    const sub = p.sub? `<text x="160" y="150" fill="${COL.sub}" font-size="14" text-anchor="middle">${p.sub}</text>`:"";
    return svg(`<text x="160" y="105" font-size="86" text-anchor="middle">${p.char}</text>${sub}`,170);
  }
  function diaWord(p){ // 大きな文字（漢字・ことば）
    const fs = p.word.length<=2?72 : p.word.length<=4?52:38;
    const sub = p.sub? `<text x="160" y="150" fill="${COL.sub}" font-size="14" text-anchor="middle">${p.sub}</text>`:"";
    return svg(`<rect x="70" y="22" width="180" height="100" rx="14" fill="#eef3ff" stroke="${COL.grid}" stroke-width="2"/>
      <text x="160" y="92" fill="${COL.ink}" font-size="${fs}" text-anchor="middle" font-weight="800">${p.word}</text>${sub}`,170);
  }
  function renderDia(d){
    if(!d) return "";
    switch(d.type){
      case"dots":return diaDots(d); case"numberline":return diaNumberline(d);
      case"array":return diaArray(d); case"groups":return diaGroups(d);
      case"pie":return diaPie(d); case"propbar":return diaPropbar(d);
      case"bars":return diaBars(d); case"clock":return diaClock(d);
      case"coins":return diaCoins(d); case"emoji":return diaEmoji(d);
      case"word":return diaWord(d); default:return "";
    }
  }

  /* ---------- スキル定義（ジェネレーター付き） ----------
     gen() は {text, dia, answer, distractors, unit, hook} を返す。
     answer は「値」。エンジンが answer＋distractors をシャッフルして選択肢にする。 */
  const SKILLS = {
    count:{ name:"かずをかぞえる", emoji:"🔢", band:"low", field:"math", prereq:null,
      hint:"数えるのが基礎の基礎。指を使ってOK。『いっしょに数えてみよう』と隣で声を合わせるのが効果的です。",
      gen(){ const n=R(3,9);
        return {hook:"○をかぞえてみよう", text:`青い○は ぜんぶで 何こ？`,
          dia:{type:"dots",a:n,b:null,cross:null},
          answer:n, distractors:[n-1,n+1,n+2], unit:"こ"}; } },

    add1:{ name:"たし算（1けた）", emoji:"➕", band:"low", field:"math", prereq:"count",
      hint:"くり上がりの前段階。図のドットを『合わせると何個？』と一緒に数えると“たし算＝合わせる”が体で分かります。",
      gen(){ const a=R(1,5),b=R(1,9-a>0?9-a:1); const bb=Math.min(b,9-a);
        return {hook:"合わせると何こ？", text:`青○が ${a}こ、黄○が ${bb}こ。あわせて 何こ？`,
          dia:{type:"dots",a:a,b:bb,cross:null}, answer:a+bb, distractors:[a+bb-1,a+bb+1,a+bb+2], unit:"こ"}; } },

    sub1:{ name:"ひき算（1けた）", emoji:"➖", band:"low", field:"math", prereq:"add1",

      gen(){ const a=R(5,9),c=R(1,a-1);
        return {hook:"のこりは何こ？", text:`○が ${a}こ。そのうち ${c}こ に ×。のこりは 何こ？`,

        return {hook:"数直線で考えよう", text:`${a} + ${b} は いくつ？`,

  /* ---------------- 🏠 せいかつ（追加） ---------------- */
  const LIFE2 = [

     e:"落ちてくる物から頭を守るのが最優先。日本は地震が多い国。",

    {q:"ペットボトルは何ごみ？", a:"資源ごみ(リサイクル)", d:["燃えるごみ","燃えないごみ","危険ごみ"], char:"♻️", lv:1,

  /* ---------- ENGINE へ登録 ---------- */
  // つながる分野チップに『ゲーム』を確実に用意（skills.js に game あり）
  E.FIELDS.game = E.FIELDS.game || {name:"ゲーム", emoji:"🎮"};

  E.CAT_TRIVIA.world   = (E.CAT_TRIVIA.world  ||[]).concat(["wld_more"]);
  E.CAT_TRIVIA.life    = (E.CAT_TRIVIA.life   ||[]).concat(["life_more"]);
  E.CAT_TRIVIA.game    = ["game_q"];

  // ミックスの回し順を再構成：算数を約1/8に減らし、ゲームを多めに・科目を多彩に

<script>
/* ============================================================
   今日の一問 — 算数・数学ラダー拡張（小学→中学→高校）
   ・skills.js / topics.js の後に読み込む
   ・「数える」から「微分」まで一本道の段階的カリキュラム
   ・lv: 1=小学 2=中学 3=高校 / prereq でつまずくと前段へ遡行
   ・図は p.diaSVG（自前SVG）を優先表示（index.html 対応済み）
   ============================================================ */
(function(){
  const E=window.ENGINE; if(!E){console.error("skills.js を先に");return;}
  const R=E.R, pick=E.pick;
  const C={ink:"#eef1ff",sub:"#8b93c8",grid:"#2b3160",blue:"#3b82f6",purple:"#8b5cf6",
    green:"#16b964",amber:"#f5a300",pink:"#ec4899",bg:"#11163a",plane:"#0e1234"};

  // ---- 共通ヘルパ ----
  const sgn=n=> n>=0?`+ ${n}`:`- ${-n}`;
  const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // 選択肢：ans 以外の一意な錯乱肢を3つ（数値なら近傍で補完）
  function U(ans, cands){
    const s=String(ans); const d=[]; const base=Number(ans);
    for(const c of cands){ const cs=String(c); if(cs!==s && !d.includes(cs)) d.push(cs); }
    let k=1;
    while(d.length<3 && k<=30){
      if(!isNaN(base)){ const v=String(base+(k%2?k:-k)); if(v!==s&&!d.includes(v))d.push(v); }
      else { const v=s+"　"+"・".repeat(k); if(!d.includes(v))d.push(v); }
      k++;
    }
    return d.slice(0,3);
  }
  // ---- 図(SVG) ----
  const SV=(inner,h)=>`<svg viewBox="0 0 320 ${h||160}" width="100%" xmlns="http://www.w3.org/2000/svg" style="display:block">${inner}</svg>`;
  function fbox(expr,sub){ const L=String(expr).length, fs=L<=9?34:L<=16?27:L<=24?21:17;
    return SV(`<rect x="16" y="32" width="288" height="84" rx="14" fill="${C.bg}" stroke="${C.grid}" stroke-width="2"/>
      <text x="160" y="84" fill="${C.ink}" font-size="${fs}" text-anchor="middle" font-weight="800">${esc(expr)}</text>
      ${sub?`<text x="160" y="138" fill="${C.sub}" font-size="13" text-anchor="middle">${esc(sub)}</text>`:""}`,158); }
  function plane(inner){ const cx=160,cy=95;
    return SV(`<rect x="6" y="8" width="308" height="172" rx="10" fill="${C.plane}" stroke="${C.grid}"/>
      <line x1="14" y1="${cy}" x2="306" y2="${cy}" stroke="#b7c4e8" stroke-width="1.5"/>
      <line x1="${cx}" y1="16" x2="${cx}" y2="176" stroke="#b7c4e8" stroke-width="1.5"/>
      <text x="300" y="${cy-5}" fill="${C.sub}" font-size="11">x</text>
      <text x="${cx+6}" y="22" fill="${C.sub}" font-size="11">y</text>${inner}`,188); }
  const clampY=y=>Math.max(18,Math.min(174,y));
  function coordLine(a,b){ const cx=160,cy=95,u=13;
    const P=[-6,6].map(x=>`${cx+x*u},${clampY(cy-(a*x+b)*u)}`);
    return plane(`<polyline points="${P.join(' ')}" fill="none" stroke="${C.blue}" stroke-width="3"/>
      <circle cx="${cx}" cy="${clampY(cy-b*u)}" r="4" fill="${C.amber}"/>`); }
  function coordParab(h,k){ const cx=160,cy=95,u=13; let pts=[];
    for(let x=h-3;x<=h+3;x+=0.5){ pts.push(`${cx+x*u},${clampY(cy-((x-h)*(x-h)+k)*u)}`); }
    return plane(`<polyline points="${pts.join(' ')}" fill="none" stroke="${C.purple}" stroke-width="3"/>
      <circle cx="${cx+h*u}" cy="${clampY(cy-k*u)}" r="5" fill="${C.amber}"/>`); }
  function triRight(a,b,c){ const ox=72,oy=142, sc=Math.min(150/Math.max(a,b),150/Math.max(a,b),16);
    const A=`${ox},${oy}`,B=`${ox+b*sc},${oy}`,Cp=`${ox},${oy-a*sc}`;
    return SV(`<polygon points="${A} ${B} ${Cp}" fill="rgba(91,157,255,.15)" stroke="${C.blue}" stroke-width="2.5"/>
      <rect x="${ox}" y="${oy-12}" width="12" height="12" fill="none" stroke="${C.blue}"/>
      <text x="${ox+b*sc/2}" y="${oy+18}" fill="${C.sub}" font-size="13" text-anchor="middle">${b}</text>
      <text x="${ox-8}" y="${oy-a*sc/2}" fill="${C.sub}" font-size="13" text-anchor="end">${a}</text>
      <text x="${ox+b*sc/2+8}" y="${oy-a*sc/2-8}" fill="${C.amber}" font-size="14" font-weight="700">${c==null?'?':c}</text>`,160); }
  function rectD(w,h){ const sc=Math.min(220/w,80/h,18), W=w*sc,H=h*sc, x=(320-W)/2,y=34;
    return SV(`<rect x="${x}" y="${y}" width="${W}" height="${H}" fill="rgba(55,224,166,.15)" stroke="${C.green}" stroke-width="2.5"/>
      <text x="160" y="${y+H+20}" fill="${C.sub}" font-size="13" text-anchor="middle">よこ ${w}</text>
      <text x="${x-8}" y="${y+H/2+4}" fill="${C.sub}" font-size="13" text-anchor="end">たて ${h}</text>`,Math.max(150,y+H+34)); }

  function add(id,def){ E.SKILLS[id]=def; }

  /* ============ 小学(lv1) 追加：小数・面積 ============ */
  add("decimal",{ name:"小数のたし算", emoji:"🔸", lv:1, prereq:"add2", field:"math",
    hint:"位をそろえるのがコツ。0.1がいくつ分か、で考えると整数のたし算と同じ。",
    gen(){ const a=R(11,98)/10, b=R(11,98)/10; const ans=Math.round((a+b)*10)/10;
      return {hook:"位をそろえて", text:`${a.toFixed(1)} + ${b.toFixed(1)} は？`,
        diaSVG:fbox(`${a.toFixed(1)} + ${b.toFixed(1)}`),
        answer:ans.toFixed(1), isText:true,
        distractors:U(ans.toFixed(1),[(ans+0.1).toFixed(1),(ans-0.1).toFixed(1),(Math.round(a+b)).toFixed(1),(ans+1).toFixed(1)]),
        explain:`位(くらい)をそろえて足すと ${ans.toFixed(1)}。0.1が何こ分か、で考えると整数と同じ。`,
        real:"お金(円)や長さ(cm)、ゲームのタイムは小数だらけ。", conn:["math","money"]}; } });

  add("area",{ name:"面積（長方形）", emoji:"⬛", lv:1, prereq:"mul1", field:"math",
    hint:"面積＝たて×よこ。図のマスを数えると“かけ算の応用”だと分かる。",
    gen(){ const w=R(3,12), h=R(2,9); const ans=w*h;
      return {hook:"たて×よこ", text:`たて${h}cm・よこ${w}cm の長方形の面積は？`,
        diaSVG:rectD(w,h), answer:ans+"cm²", isText:true,
        distractors:U(ans+"cm²",[ (w*h+w)+"cm²", (2*(w+h))+"cm²", (w+h)+"cm²" ]),
        explain:`面積＝たて×よこ＝${h}×${w}＝${ans}cm²。まわりの長さ(${2*(w+h)})と混同しないこと。`,
        real:"部屋の広さ、土地、ゲームのマップの広さ(km²)も同じ考え方。", conn:["math","geo"]}; } });

  /* ============ 中学(lv2) ============ */
  add("neg",{ name:"正負の数", emoji:"➖➕", lv:2, prereq:"sub2", field:"math",
    hint:"数直線で考える。マイナスは『左へ』。借金や氷点下のイメージ。",
    gen(){ const a=R(-9,9), b=R(1,9), minus=R(0,1); const ans=minus?a-b:a+b;
      const t=`(${a}) ${minus?'-':'+'} ${b}`;
      return {hook:"マイナスの計算", text:`${t} を計算すると？`, diaSVG:fbox(t,"数直線で左右に動くイメージ"),
        answer:String(ans), isText:true, distractors:U(ans,[ans+1,ans-1,-ans,minus?a+b:a-b]),
        explain:`${t}＝${ans}。マイナスを足す＝左へ、引く＝右へ。ゲームのHP増減と同じ。`,
        real:"気温−3℃、残高、HPの増減…負の数は日常にあふれている。", conn:["math","game"]}; } });

  add("lineq",{ name:"一次方程式", emoji:"⚖️", lv:2, prereq:"neg", field:"math",
    hint:"両辺に同じことをして x だけにする。まず数字を移項。",
    gen(){ const a=R(2,6), x=R(-6,7), b=R(-9,9); const c=a*x+b;
      const t=`${a}x ${sgn(b)} = ${c}`;
      return {hook:"x を求めよう", text:`${t}`, diaSVG:fbox(t),
        answer:`x = ${x}`, isText:true,
        distractors:U(`x = ${x}`,[`x = ${x+1}`,`x = ${x-1}`,`x = ${-x}`,`x = ${c-b}`]),
        explain:`${b} を移項して ${a}x = ${c-b}、両辺を ${a} で割って x = ${x}。`,
        real:"『あと何個で目標？』を式にして解くのが方程式。買い物や設計の基本。", conn:["math"]}; } });

  add("ratio",{ name:"比例 y=ax", emoji:"📐", lv:2, prereq:"mul1", field:"math",
    hint:"x が□倍なら y も□倍。a は1あたりの増え方。",
    gen(){ const a=R(2,6), x=R(2,9); const y=a*x;
      return {hook:"比例で求めよう", text:`y = ${a}x のとき、x=${x} なら y は？`, diaSVG:coordLine(a,0),
        answer:String(y), isText:true, distractors:U(y,[y+a,y-a,a+x,a*x+1]),
        explain:`y=${a}x に x=${x} を代入して y=${a}×${x}=${y}。グラフは原点を通る直線。`,
        real:"速さ×時間=距離、値段×個数=代金…比例は計算の主役。", conn:["math","sports"]}; } });

  add("func2",{ name:"一次関数の傾き", emoji:"📈", lv:2, prereq:"ratio", field:"math",
    hint:"y=ax+b の a が傾き(かたむき)、b が切片(y軸との交点)。",
    gen(){ let a=R(-4,5); if(a===0)a=2; const b=R(-6,6);
      return {hook:"グラフを読む", text:`y = ${a}x ${sgn(b)} の『傾き』は？`, diaSVG:coordLine(a,b),
        answer:String(a), isText:true, distractors:U(a,[b,-a,a+1,a-1]),
        explain:`y=ax+b の a が傾き。ここでは ${a}。b=${b} は切片(y軸と交わる高さ)。`,
        real:"坂の急さ、グラフの上がり方、データの変化の速さを表す。", conn:["math","science"]}; } });

  add("sqrt",{ name:"平方根（√）", emoji:"√", lv:2, prereq:"mul1", field:"math",
    hint:"√(ある数)＝2乗するとその数になる数。√(n²)=n。",
    gen(){ const n=R(2,15); const sq=n*n;
      return {hook:"2乗の逆", text:`√${sq} は いくつ？`, diaSVG:fbox(`√${sq} = ?`,`□×□ = ${sq} となる□`),
        answer:String(n), isText:true, distractors:U(n,[n+1,n-1,Math.round(sq/2),n+2]),
        explain:`${n}×${n}=${sq} だから √${sq}=${n}。√は『2乗の逆』の計算。`,
        real:"画面の対角線、地震のエネルギー、図形の長さの計算に登場。", conn:["math","science"]}; } });

  add("factor",{ name:"因数分解", emoji:"🧩", lv:2, prereq:"mul1", field:"math",
    hint:"かけて c、足して b になる2数を見つける。",
    gen(){ let p=R(1,7), q=R(1,7); if(p>q){const t=p;p=q;q=t;} const b=p+q, c=p*q;
      const t=`x² + ${b}x + ${c}`;
      return {hook:"かけてc・足してb", text:`${t} を因数分解すると？`, diaSVG:fbox(t),
        answer:`(x+${p})(x+${q})`, isText:true,
        distractors:U(`(x+${p})(x+${q})`,[`(x+${p})(x+${q+1})`,`(x+${p+1})(x+${q})`,`(x+1)(x+${c})`,`(x+${b})(x+${c})`]),
        explain:`かけて${c}・足して${b}になるのは ${p}と${q}。だから (x+${p})(x+${q})。`,
        real:"二次方程式を解く前段階。式を“部品に分解”する考え方。", conn:["math"]}; } });

  add("quad",{ name:"二次方程式", emoji:"🟰", lv:2, prereq:"factor", field:"math",
    hint:"因数分解して (x−p)(x−q)=0。各かっこ=0 が解。",
    gen(){ let p=R(1,6), q=R(1,6); if(p>q){const t=p;p=q;q=t;} const b=p+q, c=p*q;
      const t=`x² - ${b}x + ${c} = 0`;
      return {hook:"解を求めよう", text:`${t}`, diaSVG:fbox(t),
        answer:`x = ${p}, ${q}`, isText:true,
        distractors:U(`x = ${p}, ${q}`,[`x = -${p}, -${q}`,`x = ${p}, ${q+1}`,`x = ${b}, ${c}`]),
        explain:`(x-${p})(x-${q})=0 と分解。各かっこ=0 より x=${p}, ${q}。`,
        real:"ボールの軌道や面積の問題は二次方程式で解ける。", conn:["math","science"]}; } });

  add("pythagoras",{ name:"三平方の定理", emoji:"📐", lv:2, prereq:"sqrt", field:"math",
    hint:"直角をはさむ2辺の2乗の和＝斜辺の2乗。a²+b²=c²。",
    gen(){ const tri=pick([[3,4,5],[6,8,10],[5,12,13],[8,15,17],[9,12,15],[7,24,25],[20,21,29]]);
      const a=tri[0],b=tri[1],c=tri[2];
      return {hook:"a²+b²=c²", text:`直角三角形の直角をはさむ2辺が ${a} と ${b}。斜辺は？`, diaSVG:triRight(a,b,null),
        answer:String(c), isText:true, distractors:U(c,[a+b,c+1,c-1,Math.round((a+b)/1.4)]),
        explain:`${a}²+${b}²=${a*a}+${b*b}=${c*c}=${c}²。だから斜辺は ${c}。`,
        real:"地図上の最短距離、テレビの画面サイズ(対角線)もこれで出せる。", conn:["math","game"]}; } });

  add("angle",{ name:"多角形の内角", emoji:"🔺", lv:2, prereq:"mul1", field:"math",
    hint:"n角形の内角の和＝180×(n−2)。三角形に分けて数える。",
    gen(){ const n=R(3,9); const ans=180*(n-2); const name={3:"三",4:"四",5:"五",6:"六",7:"七",8:"八",9:"九"}[n];
      return {hook:"三角形に分けて", text:`${name}角形の内角の和は？`, diaSVG:fbox(`180 × (${n} - 2)`),
        answer:ans+"°", isText:true, distractors:U(ans+"°",[(ans+180)+"°",(ans-180)+"°",(180*n)+"°"]),
        explain:`n角形は三角形(180°)が (n-2)個分。180×(${n}-2)=${ans}°。`,
        real:"製図・建築・ゲームの当たり判定など図形のいたる所で使う。", conn:["math","tech"]}; } });

  add("prob",{ name:"確率", emoji:"🎲", lv:2, prereq:"fraction", field:"math",
    hint:"確率＝(あてはまる場合の数)÷(全部の場合の数)。",
    gen(){ const it=pick([
      {q:"1個のサイコロで 6 の目が出る確率は？",a:"1/6",d:["1/2","1/3","1/12"]},
      {q:"1個のサイコロで 偶数 が出る確率は？",a:"1/2",d:["1/3","1/6","2/3"]},
      {q:"1個のサイコロで 3以上 が出る確率は？",a:"2/3",d:["1/2","1/3","1/6"]},
      {q:"コインを1回投げて 表 が出る確率は？",a:"1/2",d:["1/4","1/3","1"]},
      {q:"トランプ52枚から1枚ひく。ハートの確率は？",a:"1/4",d:["1/13","1/2","1/52"]},
    ]);
      return {hook:"場合の数で考える", text:it.q, diaSVG:fbox("確率 = あてはまる ÷ ぜんぶ"),
        answer:it.a, isText:true, distractors:it.d,
        explain:`確率＝(あてはまる場合)÷(全部)。答えは ${it.a}。ガチャやドロップ率と同じ考え方。`,
        real:"天気予報・くじ・ゲームのガチャ…確率が読めると損得が分かる。", conn:["math","game"]}; } });

  /* ============ 高校(lv3) ============ */
  add("quadfunc",{ name:"二次関数の頂点", emoji:"⛰️", lv:3, prereq:"func2", field:"math",
    hint:"y=(x−h)²+k の頂点は (h, k)。グラフの折り返し点。",
    gen(){ const h=R(-3,3), k=R(-4,4);
      const hs = h===0?"x" : (h>0?`x - ${h}`:`x + ${-h}`);
      return {hook:"放物線の折り返し点", text:`y = (${hs})² ${sgn(k)} の頂点は？`, diaSVG:coordParab(h,k),
        answer:`(${h}, ${k})`, isText:true,
        distractors:U(`(${h}, ${k})`,[`(${-h}, ${k})`,`(${h}, ${-k})`,`(${k}, ${h})`]),
        explain:`y=(x-h)²+k の頂点は (h,k)=(${h}, ${k})。グラフの一番下(または上)の点。`,
        real:"ボールやジャンプの軌道、橋のアーチの形は放物線。", conn:["math","science","game"]}; } });

  add("trig",{ name:"三角比", emoji:"📐", lv:3, prereq:"pythagoras", field:"math",
    hint:"直角三角形の辺の比。特別角(30,45,60°)の値は暗記が近道。",
    gen(){ const it=pick([
      {q:"sin30° は？",a:"1/2"},{q:"cos60° は？",a:"1/2"},
      {q:"sin60° は？",a:"√3/2"},{q:"cos30° は？",a:"√3/2"},
      {q:"sin45° は？",a:"√2/2"},{q:"cos45° は？",a:"√2/2"},
      {q:"tan45° は？",a:"1"},{q:"tan60° は？",a:"√3"},{q:"tan30° は？",a:"1/√3"},
    ]);
      const all=["1/2","√3/2","√2/2","1","√3","1/√3"]; const d=all.filter(x=>x!==it.a);
      return {hook:"特別角の値", text:it.q, diaSVG:triRight(1,Math.sqrt(3),2),
        answer:it.a, isText:true, distractors:U(it.a,d),
        explain:`三角比は直角三角形の辺の比。${it.q.replace('は？','')} ＝ ${it.a}(特別角の基本値)。`,
        real:"建物の高さ測定、ゲームの3D描画、波や音の解析に必須。", conn:["math","tech","game"]}; } });

  add("explog",{ name:"指数・対数", emoji:"🔢", lv:3, prereq:"sqrt", field:"math",
    hint:"指数=同じ数を何回かける。a^m×a^n=a^(m+n)。対数は指数の逆。",
    gen(){ const type=R(0,2);
      if(type===0){ const a=R(2,5), n=R(2,4); const v=Math.pow(a,n);
        return {hook:"何乗？", text:`${a}^${n} は いくつ？`, diaSVG:fbox(`${a}^${n} = ${a}×…×${a}`,`${a}を${n}回かける`),
          answer:String(v), isText:true, distractors:U(v,[a*n,Math.pow(a,n-1),v+a,v-1]),
          explain:`${a}を${n}回かけて ${v}。指数はゲームのEXPや細胞分裂の“急増”を表す。`,
          real:"データ量(GB)、複利、ウイルスの拡大も指数で増える。", conn:["math","tech"]}; }
      if(type===1){ const p=R(1,4), q=R(1,4);
        return {hook:"指数法則", text:`2^${p} × 2^${q} = 2^□ の □ は？`, diaSVG:fbox(`2^${p} × 2^${q} = 2^□`),
          answer:String(p+q), isText:true, distractors:U(p+q,[p*q,p+q+1,Math.abs(p-q)]),
          explain:`同じ底のかけ算は指数を足す：2^${p}×2^${q}=2^(${p}+${q})=2^${p+q}。`,
          real:"大きな数の計算を一気に簡単にする道具。", conn:["math","tech"]}; }
      const b=pick([2,3,5,10]); const n=R(1,3); const v=Math.pow(b,n);
      return {hook:"対数＝指数の逆", text:`log${b} ${v} は いくつ？（${b}を何乗すると${v}？）`, diaSVG:fbox(`${b}^□ = ${v}`),
        answer:String(n), isText:true, distractors:U(n,[v,n+1,b]),
        explain:`${b}を${n}乗すると${v}。だから log${b}${v}=${n}。対数は『何乗したか』を答える。`,
        real:"音の大きさ(dB)や地震(マグニチュード)は対数の目盛り。", conn:["math","science"]}; } });

  add("seq",{ name:"数列", emoji:"🔗", lv:3, prereq:"lineq", field:"math",
    hint:"等差は『毎回+d』、等比は『毎回×r』。第n項の公式を使う。",
    gen(){ const kind=R(0,1);
      if(kind===0){ const a=R(1,9), d=R(2,5), n=R(4,8); const v=a+(n-1)*d;
        return {hook:"等差数列", text:`初項${a}・公差${d} の等差数列。第${n}項は？`,
          diaSVG:fbox(`${a}, ${a+d}, ${a+2*d}, …`,`毎回 +${d}`),
          answer:String(v), isText:true, distractors:U(v,[a+n*d,v-d,v+d,a*n]),
          explain:`第n項＝初項+(n-1)×公差＝${a}+(${n}-1)×${d}=${v}。`,
          real:"貯金を毎月一定額ふやす、座席の数の規則…等差はパターン読みの基本。", conn:["math","money"]}; }
      const a=R(1,4), r=R(2,3), n=R(3,5); const v=a*Math.pow(r,n-1);
      return {hook:"等比数列", text:`初項${a}・公比${r} の等比数列。第${n}項は？`,
        diaSVG:fbox(`${a}, ${a*r}, ${a*r*r}, …`,`毎回 ×${r}`),
        answer:String(v), isText:true, distractors:U(v,[a*r*n,v/r,v*r,a+r*n]),
        explain:`第n項＝初項×公比^(n-1)＝${a}×${r}^${n-1}=${v}。指数的に増える数列。`,
        real:"複利、ねずみ算、画面の解像度…倍々で増えるものはこれ。", conn:["math","money"]}; } });

  add("comb",{ name:"場合の数・組合せ", emoji:"🎯", lv:3, prereq:"mul1", field:"math",
    hint:"並べる=順列(nPr)、選ぶだけ=組合せ(nCr)。nCr=nPr÷r!。",
    gen(){ const n=R(4,6), r=R(2,3);
      const fact=x=>{let f=1;for(let i=2;i<=x;i++)f*=i;return f;};
      const nPr=fact(n)/fact(n-r); const nCr=nPr/fact(r);
      return {hook:"選び方は何通り？", text:`${n}人から${r}人を選ぶ組合せ（${n}C${r}）は？`,
        diaSVG:fbox(`${n}C${r} = ${n}P${r} ÷ ${r}!`),
        answer:String(nCr), isText:true, distractors:U(nCr,[nPr,n*r,nCr+1,n+r]),
        explain:`${n}C${r}＝${n}P${r}÷${r}!＝${nPr}÷${fact(r)}＝${nCr}。順番を区別しない選び方。`,
        real:"くじの当たりやすさ、デッキの組み方、ガチャの確率計算の土台。", conn:["math","game"]}; } });

  add("diff",{ name:"微分（入口）", emoji:"📉", lv:3, prereq:"quadfunc", field:"math",
    hint:"x^n を微分すると n·x^(n−1)。傾きを式で出す道具。",
    gen(){ const a=R(1,4);
      return {hook:"傾きを式にする", text:`y = ${a}x² を微分すると（導関数 y' は）？`,
        diaSVG:fbox(`y = ${a}x²  →  y' = ?`,`x² の微分は 2x`),
        answer:`${2*a}x`, isText:true,
        distractors:U(`${2*a}x`,[`${a}x`,`${2*a}x²`,`${a*a}x`,`${2*a}`]),
        explain:`x²を微分すると2x。係数はそのまま掛けて y'=${2*a}x。微分は“その瞬間の傾き”を出す道具。`,
        real:"速度(位置の変化率)、最速・最短の設計、AIの学習も微分で動く。", conn:["math","tech","science"]}; } });

  /* ============ 既存の小学スキルに lv=1 を付与 ============ */
  ["count","add1","sub1","add2","sub2","mul1","div1","fraction","percent","average","time","money"]
    .forEach(id=>{ if(E.SKILLS[id]) E.SKILLS[id].lv=1; });

  /* ============ ラダー（数える→…→微分）と難易度帯 ============ */
  E.BAND_ORDER.all = [
    // 小学(lv1)
    "count","add1","sub1","add2","sub2","mul1","div1","fraction","decimal","percent","average","area","time","money",
    // 中学(lv2)
    "neg","lineq","ratio","func2","sqrt","factor","quad","pythagoras","angle","prob",
    // 高校(lv3)
    "quadfunc","trig","explog","seq","comb","diff",
  ];
  // レベル選択 → 算数ラダーの開始/上限（index.html が mathRange を使用）
  E.MATH_RANGE = { all:{start:1,max:3}, e:{start:1,max:1}, m:{start:2,max:2}, h:{start:3,max:3} };
  E.LADDER_LABEL = {1:"小学",2:"中学",3:"高校"};

  // 算数カテゴリ名を「算数・数学」に
  if(E.CATEGORIES.math) E.CATEGORIES.math={name:"算数・数学",emoji:"🔢"};

  // 各段の「学年」ラベル（バナー表示用）
  E.MATH_GRADE = {
    count:"小1", add1:"小1", sub1:"小1", time:"小1",
    add2:"小2", sub2:"小2", mul1:"小2", money:"小2",
    div1:"小3", fraction:"小3",
    decimal:"小4", area:"小4",
    percent:"小5", average:"小5",
    neg:"中1", lineq:"中1", ratio:"中1",
    angle:"中2", func2:"中2", prob:"中2",
    sqrt:"中3", factor:"中3", quad:"中3", pythagoras:"中3",
    quadfunc:"高1", trig:"高1", comb:"高1",
    explog:"高2", seq:"高2",
    diff:"高3",
  };
})();

</script>
<script>
const E=window.ENGINE, SKILLS=E.SKILLS, BAND_ORDER=E.BAND_ORDER, FIELDS=E.FIELDS, META=E.META;
const TRIVIA=E.TRIVIA, CATEGORIES=E.CATEGORIES, MIX_CYCLE=E.MIX_CYCLE, CAT_TRIVIA=E.CAT_TRIVIA;
const $=id=>document.getElementById(id);

const LEVELS=[{min:0,title:"たんけん見習い"},{min:100,title:"ものしりルーキー"},{min:250,title:"ひらめき探検家"},
  {min:450,title:"つながりマスター"},{min:700,title:"ちしきの賢者"},{min:1000,title:"世界をつなぐ者"}];
const BADGES=[
  {id:"first",emoji:"🌱",name:"はじめの一歩",test:s=>s.totalAnswered>=1},
  {id:"streak3",emoji:"🔥",name:"3日れんぞく",test:s=>s.streak>=3},
  {id:"ten",emoji:"🎯",name:"10問とっぱ",test:s=>s.totalAnswered>=10},
  {id:"combo5",emoji:"💎",name:"5問れんしょう",test:s=>s.bestCombo>=5},
  {id:"master1",emoji:"⭐",name:"1スキル達人",test:s=>masteredCount(s)>=1},
  {id:"master3",emoji:"🧭",name:"3スキル達人",test:s=>masteredCount(s)>=3},
  {id:"hundred",emoji:"👑",name:"100問の道",test:s=>s.totalAnswered>=100},
];
function masteredCount(s){return Object.values(s.skills||{}).filter(x=>x.m>=80).length;}

const KEY="kyounoichimon_v3";
function todayStr(){const d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function load(){
  let s;try{s=JSON.parse(localStorage.getItem(KEY));}catch(e){s=null;}
  if(!s) s={xp:0,streak:0,lastDay:null,totalAnswered:0,correct:0,combo:0,bestCombo:0,
    badges:[],focus:"mix",level:"all",mixIdx:0,autoRead:false,history:[],skills:{},trivia:{},currentSkill:null,wrongStreak:0,answeredToday:0};
  s.skills=s.skills||{}; s.trivia=s.trivia||{}; s.badges=s.badges||[]; s.history=s.history||[];
  if(!s.focus)s.focus="mix"; if(!s.level)s.level="all"; if(s.mixIdx==null)s.mixIdx=0;
  return s;
}
function save(s){localStorage.setItem(KEY,JSON.stringify(s));}
let S=load();
function mastery(id){return (S.skills[id]&&S.skills[id].m)||0;}
function ensureSkill(id){if(!S.skills[id])S.skills[id]={m:0,att:0,cor:0};return S.skills[id];}

/* ---- 算数：現在スキルの決定（レベル帯の中で、やさしい所→難しい所） ---- */
function mathRange(){ return E.mathRange||{start:1,max:3}; }
function skLv(id){ return (SKILLS[id]&&SKILLS[id].lv)||1; }
function firstUnmastered(){
  const r=mathRange(), list=BAND_ORDER.all;
  // レベル帯内で最初の未習得
  for(const id of list){ const lv=skLv(id); if(lv>=r.start && lv<=r.max && mastery(id)<80) return id; }
  // 帯内が全て習得済みなら、帯内の最後を返す
  const inb=list.filter(id=>{const lv=skLv(id);return lv>=r.start&&lv<=r.max;});
  return inb.length?inb[inb.length-1]:list[0];
}
function fixCurrent(){
  if(!S.currentSkill || !SKILLS[S.currentSkill]) S.currentSkill=firstUnmastered();
}
function trec(id){ if(!S.trivia[id])S.trivia[id]={att:0,cor:0}; return S.trivia[id]; }

/* ---- 音声 ---- */
let speaking=null;
function speak(text,btn){
  if(!("speechSynthesis"in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang="ja-JP"; u.rate=0.95; u.pitch=1.05;
  const vs=window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.indexOf("ja")===0);
  if(vs.length)u.voice=vs[0];
  if(btn)btn.classList.add("playing"); u.onend=()=>{if(btn)btn.classList.remove("playing");};
  window.speechSynthesis.speak(u);
}
if("speechSynthesis"in window)window.speechSynthesis.onvoiceschanged=()=>{};

/* ---- レベル/描画 ---- */
function levelFor(xp){let lv=1,t=LEVELS[0].title,cur=0,next=LEVELS[1].min;
  for(let i=0;i<LEVELS.length;i++)if(xp>=LEVELS[i].min){lv=i+1;t=LEVELS[i].title;cur=LEVELS[i].min;next=(i+1<LEVELS.length)?LEVELS[i+1].min:LEVELS[i].min;}
  return {lv,title:t,cur,next};}
function renderHeader(){
  $("streak").textContent=S.streak; $("xp").textContent=S.xp;
  const L=levelFor(S.xp); $("lvBadge").textContent="Lv"+L.lv; $("lvTitle").textContent=L.title;
  const span=L.next-L.cur,into=S.xp-L.cur;
  $("lvRemain").textContent=(L.next>L.cur)?Math.max(0,L.next-S.xp):"MAX";
  $("lvBar").style.width=(L.next>L.cur?Math.min(100,into/span*100):100)+"%";
}
function renderGradeSel(){
  const box=$("gradeSel"); box.innerHTML="";
  Object.entries(CATEGORIES).forEach(([k,v])=>{
    const d=document.createElement("div"); d.className="gchip"+(S.focus===k?" active":"");
    d.innerHTML=v.emoji+"<small>"+v.name+"</small>";
    d.onclick=()=>{S.focus=k; save(S); renderGradeSel(); renderQuestion(); window.scrollTo({top:0,behavior:"smooth"});};
    box.appendChild(d);
  });
}
function applyLevel(){ // S.level → トリビア出題範囲＋算数ラダーの帯
  const ui=(E.LEVELS_UI&&E.LEVELS_UI[S.level])||null;
  E.levelRange = ui?ui.range:{min:1,max:3};
  E.mathRange = (E.MATH_RANGE&&E.MATH_RANGE[S.level])||{start:1,max:3};
}
function renderLevelSel(){
  const box=$("levelSel"); if(!box||!E.LEVELS_UI)return; box.innerHTML="";
  Object.entries(E.LEVELS_UI).forEach(([k,v])=>{
    const d=document.createElement("div"); d.className="gchip"+(S.level===k?" active":"");
    d.innerHTML=v.emoji+"<small>"+v.name+"</small>";
    d.onclick=()=>{S.level=k; applyLevel(); S.currentSkill=firstUnmastered(); save(S);
      renderLevelSel(); renderQuestion(); window.scrollTo({top:0,behavior:"smooth"});};
    box.appendChild(d);
  });
}
function renderNowSkill(){
  if(!current){$("nowSkill").innerHTML="";return;}
  const extra = current.isMath? `（習得度 ${mastery(current.skillId)}%）` : "（クイズ）";
  $("nowSkill").innerHTML=`<span class="dot"></span>いまのもんだい：<b>${current.label}</b>${extra}`;
}
function renderSkillsMap(){
  const box=$("skillsMap"); box.innerHTML="";
  const list=BAND_ORDER.all; let lastLv=0;
  list.forEach(id=>{
    const sk=SKILLS[id]; if(!sk)return; const lv=sk.lv||1, m=mastery(id), st=S.skills[id];
    if(lv!==lastLv){ lastLv=lv;
      const h=document.createElement("div");
      h.style.cssText="font-size:12px;font-weight:800;color:var(--sub);margin:12px 4px 6px;letter-spacing:.05em;";
      const lab=(E.LADDER_LABEL&&E.LADDER_LABEL[lv])||""; const ico={1:"🌱",2:"🔥",3:"⚡"}[lv]||"";
      h.textContent=`${ico} ${lab}レベル`; box.appendChild(h);
    }
    const weak = st&&st.att>=2 && m<40;
    const isnow = id===S.currentSkill;
    const div=document.createElement("div");
    div.className="srow"+(weak?" weak":"")+(m>=80?" mastered":"");
    if(isnow) div.style.borderColor="var(--accent)";
    const col=m>=80?"var(--good)":m>=40?"var(--blue)":weak?"var(--bad)":"var(--purple)";
    div.innerHTML=`<div class="top"><span class="e">${sk.emoji}</span>${sk.name}${isnow?' <span style="color:var(--accent);font-size:11px">◀ いまここ</span>':''}
      <span class="pct">${m>=80?"達人 ✓":(st&&st.att?m+"%":"未挑戦")}</span></div>
      <div class="track"><i style="width:${m}%;background:${col}"></i></div>`;
    box.appendChild(div);
  });
}
function renderBadges(){
  const box=$("badges"); box.innerHTML="";
  BADGES.forEach(b=>{const got=S.badges.includes(b.id);
    const d=document.createElement("div"); d.className="badge"+(got?" got":"");
    d.innerHTML=`<div class="bcircle">${b.emoji}</div><div class="bname">${b.name}</div>`; box.appendChild(d);});
}
function checkBadges(){let n=[];BADGES.forEach(b=>{if(!S.badges.includes(b.id)&&b.test(S)){S.badges.push(b.id);n.push(b);}});return n;}

/* ---- 問題生成 ---- */
let current=null, answered=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildChoices(p){
  const ansKey=String(p.answer);
  let ds=(p.distractors||[]).map(String).filter(x=>x!==ansKey);
  ds=[...new Set(ds)];
  if(!p.isText){
    // 数値問題：不正値を除外し、足りなければ近い値で補完して4択に
    ds=ds.filter(x=>Number(x)>=0 && x!=="NaN");
    let guard=0;
    while(ds.length<3 && guard++<30){
      const base=Number(p.answer)||0; const cand=String(base+E.R(-3,4));
      if(cand!==ansKey && !ds.includes(cand) && Number(cand)>=0) ds.push(cand);
    }
  }
  // 文字問題：プールにある分だけ（3択でも可）
  return shuffle([ansKey,...ds.slice(0,3)]);
}
/* ---- 科目を決めて1問つくる（ミックスは科目を自動で回す） ---- */
function decideCategory(){
  if(S.focus!=="mix") return S.focus;
  const cat=MIX_CYCLE[S.mixIdx % MIX_CYCLE.length];
  S.mixIdx=(S.mixIdx+1)%MIX_CYCLE.length;
  return cat;
}
function getNext(){
  const cat=decideCategory();
  if(cat==="math"){
    fixCurrent();
    const sk=SKILLS[S.currentSkill]; const p=sk.gen();
    // 生成側が解説等を持っていればそれを使い、無ければ既定で補う
    if(!p.explain) p.explain=`答えは ${p.answer}${p.unit||""}。上の図でいっしょに確かめてみよう。`;
    if(!p.real)    p.real=(META[S.currentSkill]&&META[S.currentSkill].real)||"";
    if(!p.conn)    p.conn=(META[S.currentSkill]&&META[S.currentSkill].conn)||["math"];
    const lvl=E.LADDER_LABEL?(E.LADDER_LABEL[sk.lv||1]+"・"):"";
    return {isMath:true, category:"math", skillId:S.currentSkill, sk, p,
      label:`${sk.emoji} ${lvl}${sk.name}`};
  } else {
    const ids=CAT_TRIVIA[cat]||[]; const tid=ids[Math.floor(Math.random()*ids.length)];
    const t=TRIVIA[tid]; const p=t.gen();
    return {isMath:false, category:cat, triviaId:tid, p,
      label:`${CATEGORIES[cat].emoji} ${CATEGORIES[cat].name}`};
  }
}
function renderQuestion(){
  answered=false;
  current=getNext();
  const p=current.p;
  $("reveal").classList.remove("show");
  // 教科バナー＋テーマ色
  const subjKey = current.isMath?"math":current.category;
  const subj = (E.SUBJECTS&&E.SUBJECTS[subjKey])||{name:"がくしゅう",emoji:"📘",color:"#3b82f6",bg:"#e7f0ff"};
  const grade = current.isMath ? ((E.MATH_GRADE&&E.MATH_GRADE[current.skillId])||(E.STAGE&&E.STAGE[(current.sk.lv||1)])||"")
                               : ((E.STAGE&&E.STAGE[(p.lv||1)])||"小学");
  const fieldName = current.isMath ? current.sk.name : ((E.TRIVIA[current.triviaId]&&E.TRIVIA[current.triviaId].name)||subj.name);
  document.documentElement.style.setProperty("--subj", subj.color);
  document.documentElement.style.setProperty("--subjbg", subj.bg);
  $("sbEmoji").textContent=subj.emoji; $("sbSubj").textContent=subj.name; $("sbField").textContent=fieldName;
  $("sbGrade").innerHTML=grade+'<small>レベル</small>';
  $("tLvl").textContent=current.isMath?("習得度 "+mastery(current.skillId)+"%"):"クイズ ✨";
  $("tDay").textContent="第"+(S.totalAnswered+1)+"問";
  $("hook").textContent="👀 "+p.hook;
  $("diaWrap").innerHTML = p.diaSVG || E.renderDia(p.dia);
  $("qtext").textContent=p.text;
  // カード登場アニメ＋マスコットを通常に
  const card=$("card"); card.classList.remove("pop"); void card.offsetWidth; card.classList.add("pop");
  setMascot("🦊");
  const choices=buildChoices(p); current.choices=choices;
  const cbox=$("choices"); cbox.innerHTML="";
  choices.forEach(val=>{
    const btn=document.createElement("button"); btn.className="choice";
    btn.textContent=val+(p.unit||""); btn.dataset.val=val;
    btn.onclick=()=>answer(val,btn); cbox.appendChild(btn);
  });
  renderNowSkill();
  if(S.autoRead) setTimeout(()=>speak(p.hook+"。 "+p.text,$("qSpeak")),250);
}

function answer(val,btn){
  if(answered)return; answered=true;
  const p=current.p, ansKey=String(p.answer), correct=(String(val)===ansKey);
  [...document.querySelectorAll(".choice")].forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===ansKey)b.classList.add("correct");
    else if(b===btn)b.classList.add("wrong"); else b.classList.add("dim");
  });

  S.totalAnswered++;
  const t=todayStr();
  if(S.lastDay!==t){ if(S.lastDay){const diff=Math.round((new Date(t)-new Date(S.lastDay))/86400000); S.streak=(diff===1)?S.streak+1:1;} else S.streak=1; S.lastDay=t; S.answeredToday=0; }
  S.answeredToday=(S.answeredToday||0)+1;

  let gained=0, stepMsg=null, stepUp=false;
  // コンボ・正答率（全科目共通）
  if(correct){ S.correct++; S.combo++; if(S.combo>S.bestCombo)S.bestCombo=S.combo; }
  else S.combo=0;

  if(current.isMath){
    const st=ensureSkill(current.skillId); st.att++;
    if(correct){
      st.cor++; st.m=Math.min(100,st.m+20); S.wrongStreak=0;
      gained=10+Math.min(20,(S.combo-1)*3); showVerdict(true,gained); if(S.combo>=2)popCombo(S.combo);
      if(st.m>=80){ const list=BAND_ORDER.all; const idx=list.indexOf(current.skillId);
        const cap=mathRange().max;
        let nextId=null; for(let i=idx+1;i<list.length;i++){ if(skLv(list[i])<=cap && mastery(list[i])<80){nextId=list[i];break;} }
        if(nextId){ S.currentSkill=nextId;
          const nlv=E.LADDER_LABEL?E.LADDER_LABEL[skLv(nextId)]+"・":"";
          stepMsg=`🎉「${current.sk.name}」マスター！つぎは「${SKILLS[nextId].emoji} ${nlv}${SKILLS[nextId].name}」！`; stepUp=true; }
        else { stepMsg=`🎉「${current.sk.name}」マスター！このレベルの算数は制覇！上のレベルに挑戦してみよう。`; stepUp=true; }
      }
    } else {
      st.m=Math.max(0,st.m-12); S.wrongStreak=(S.wrongStreak||0)+1; gained=4; showVerdict(false,gained);
      if(S.wrongStreak>=2 && current.sk.prereq){
        S.currentSkill=current.sk.prereq; S.wrongStreak=0;
        stepMsg=`🧰 ここは少しむずかしいね。基礎の「${SKILLS[current.sk.prereq].emoji} ${SKILLS[current.sk.prereq].name}」にもどって、できる所から固めよう。`;
      }
    }
    S.history.push({ts:Date.now(),skill:current.skillId,cat:"math",correct});
  } else {
    const tr=trec(current.triviaId); tr.att++; if(correct)tr.cor++;
    if(correct){ gained=8+Math.min(16,(S.combo-1)*3); showVerdict(true,gained); if(S.combo>=2)popCombo(S.combo); }
    else { gained=4; showVerdict(false,gained); }
    S.history.push({ts:Date.now(),skill:"t:"+current.triviaId,cat:current.category,correct});
  }
  S.xp+=gained;
  // 動きの演出：正解は紙吹雪＆よろこぶマスコット、不正解は応援マスコット
  if(correct){ confetti(); setMascot(["🎉","😆","🥳","⭐","🙌"][Math.floor(Math.random()*5)], true); }
  else { setMascot(["💪","🤔","✨"][Math.floor(Math.random()*3)], true); }
  if(S.history.length>600)S.history=S.history.slice(-600);

  // 解説（図で見ると / 実生活 / つながる分野）
  $("explain").textContent = current.p.explain||"";
  $("real").textContent = current.p.real||"";
  const chips=$("connectChips"); chips.innerHTML="";
  (current.p.conn||[]).forEach(fk=>{const f=FIELDS[fk]; if(!f)return;
    const sp=document.createElement("span"); sp.className="connchip"; sp.textContent=f.emoji+" "+f.name; chips.appendChild(sp);});

  const newly=checkBadges();
  save(S);
  renderHeader(); renderSkillsMap(); renderBadges();

  if(stepMsg){ const n=$("stepNote"); n.className="stepnote show"+(stepUp?" up":""); n.textContent=stepMsg; }
  else $("stepNote").className="stepnote";

  $("reveal").classList.add("show"); $("reveal").scrollIntoView({behavior:"smooth",block:"nearest"});
  if(S.autoRead) setTimeout(()=>speak((correct?"せいかい！":"おしい！")+" "+(current.p.explain||""),null),400);
  if(newly.length) setTimeout(()=>toast("🏅 バッジ獲得！「"+newly[0].name+"」"),700);
}
function showVerdict(ok,xp){
  const v=$("verdict"); v.className="verdict "+(ok?"ok":"ng");
  v.innerHTML=ok?`<span class="big">🎉</span> せいかい！　<span style="color:var(--accent)">+${xp}XP</span>`
    :`<span class="big">💪</span> おしい！“挑戦XP” <span style="color:var(--accent)">+${xp}</span> ゲット`;
}
function popCombo(n){const p=$("comboPop");p.textContent=n+" コンボ！🔥";p.classList.remove("go");void p.offsetWidth;p.classList.add("go");}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove("show"),2600);}
function setMascot(face,react){ const m=$("mascot"); if(!m)return; m.textContent=face;
  if(react){ m.classList.remove("react"); void m.offsetWidth; m.classList.add("react"); } }
function confetti(){
  const colors=["#ff8a2b","#ffd23f","#13c08a","#3b82f6","#ec4899","#8b5cf6","#22c55e"];
  for(let i=0;i<46;i++){
    const d=document.createElement("div"); d.className="confetti";
    d.style.left=(Math.random()*100)+"vw";
    d.style.background=colors[i%colors.length];
    d.style.transform="rotate("+(Math.random()*360)+"deg)";
    const dur=0.9+Math.random()*0.8, delay=Math.random()*0.25;
    d.style.animation=`fall ${dur}s cubic-bezier(.3,.4,.6,1) ${delay}s forwards`;
    if(Math.random()<.5) d.style.borderRadius="50%";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), (dur+delay)*1000+200);
  }
}

/* ---- 保護者レポート ---- */
const PARENT_TIP={
  general_low:"今は<b>正解より「触れた回数」</b>が大事な時期。できた問題数そのものを褒めてあげてください。",
  general_ok:"順調です。<b>むずかしい問題に挑戦した</b>こと自体を具体的に言葉にして褒めると、挑戦が好きになります。",
};
function openParent(){
  const week=Date.now()-7*86400000, wk=S.history.filter(h=>h.ts>=week);
  $("rWeek").textContent=wk.length; $("rTotal").textContent=S.totalAnswered;
  const acc=S.totalAnswered?Math.round(S.correct/S.totalAnswered*100):0; $("rAcc").textContent=acc+"%";

  // スキル別習得度
  const box=$("rSkills"); box.innerHTML="";
  const tried=BAND_ORDER.all.filter(id=>S.skills[id]&&S.skills[id].att>0);
  if(tried.length===0) box.innerHTML='<div style="color:var(--sub);font-size:13px">まだ記録がありません。1問やってみましょう。</div>';
  tried.forEach(id=>{const sk=SKILLS[id],m=mastery(id),st=S.skills[id];
    const col=m>=80?"var(--good)":m>=40?"var(--blue)":"var(--bad)";
    const d=document.createElement("div"); d.className="repbar";
    d.innerHTML=`<div class="top"><span>${sk.emoji} ${sk.name}</span><span>${m}%（${st.cor}/${st.att}正解）</span></div>
      <div class="track"><i style="width:${m}%;background:${col}"></i></div>`; box.appendChild(d);
  });

  // つまずきポイント＝挑戦したのに習得度が低いスキル
  const weak=tried.filter(id=>S.skills[id].att>=2 && mastery(id)<40)
    .sort((a,b)=>mastery(a)-mastery(b));
  const stuckEl=$("rStuck"), voiceEl=$("rVoice");
  if(weak.length){
    const id=weak[0], sk=SKILLS[id];
    stuckEl.style.display="block";
    stuckEl.innerHTML=`📍 <b>つまずきポイント：${sk.emoji} ${sk.name}</b><br>`+
      `何度か挑戦していますが習得度 ${mastery(id)}%。アプリは自動で前の「${sk.prereq?SKILLS[sk.prereq].name:"基礎"}」に戻して練習させています。`;
    voiceEl.innerHTML=`🗣 <b>声がけのヒント</b><br>${sk.hint}`;
  } else {
    stuckEl.style.display="none";
    // いま伸びてるスキルを褒める材料に
    const best=tried.slice().sort((a,b)=>mastery(b)-mastery(a))[0];
    let v = acc>=70?PARENT_TIP.general_ok:PARENT_TIP.general_low;
    if(best) v=`🗣 <b>声がけのヒント</b><br>いま <b>${SKILLS[best].emoji}${SKILLS[best].name}</b> が伸びています（習得度${mastery(best)}%）。「${SKILLS[best].name}、できるようになってきたね」と具体的に伝えるのが効果的。<br>`+v;
    voiceEl.innerHTML=v;
  }
  $("parentModal").classList.add("show");
}

/* ---- ボタン ---- */
$("nextBtn").onclick=()=>{$("stepNote").className="stepnote"; renderQuestion(); window.scrollTo({top:0,behavior:"smooth"});};
$("stopBtn").onclick=()=>{ if("speechSynthesis"in window)window.speechSynthesis.cancel();
  $("card").innerHTML=`<div class="done"><div class="big">🌙</div><h2>今日もよくがんばったね</h2>
    <p>今日は <b>${S.answeredToday}問</b> ／ つうさん <b>${S.totalAnswered}問</b><br>XP <b>${S.xp}</b>・連続 <b>${S.streak}日</b><br><br>また明日、新しい一問が待ってるよ。</p>
    <button class="btn" onclick="location.reload()">もう一問やる ▶</button></div>`;
  window.scrollTo({top:0,behavior:"smooth"});};
$("qSpeak").onclick=()=>speak(current.p.hook+"。 "+current.p.text+"。 "+current.choices.map(c=>c+(current.p.unit||"")).join("、 "),$("qSpeak"));
document.querySelectorAll(".miniSpeak").forEach(b=>{b.onclick=()=>speak($(b.dataset.for).textContent,null);});
$("autoReadBtn").onclick=()=>{S.autoRead=!S.autoRead;save(S);$("autoReadBtn").classList.toggle("on",S.autoRead);toast(S.autoRead?"🔊 自動読み上げ ON":"🔇 自動読み上げ OFF");};
$("parentBtn").onclick=openParent;
$("parentClose").onclick=()=>$("parentModal").classList.remove("show");
$("parentModal").onclick=e=>{if(e.target.id==="parentModal")$("parentModal").classList.remove("show");};
$("resetLink").onclick=e=>{e.preventDefault();if(confirm("進み具合を全部消して、さいしょからやり直す？")){localStorage.removeItem(KEY);location.reload();}};

/* 初期化 */
fixCurrent(); applyLevel();
$("autoReadBtn").classList.toggle("on",S.autoRead);
renderHeader(); renderGradeSel(); renderLevelSel(); renderSkillsMap(); renderBadges(); renderQuestion();
</script>
